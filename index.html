function sbSubscribeServices(){
  if (!sb) return;
  sb.channel('services-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'services' }, payload => {
      const changed = payload.new || payload.old;
      if (!changed) return;
      const idx = DB.services.findIndex(s => s.id === changed.id);
      if (payload.eventType === 'DELETE'){
        if (idx >= 0) DB.services.splice(idx, 1);
      } else {
        const local = sbSvcToLocal(changed);
        if (idx >= 0) DB.services[idx] = local;
        else DB.services.unshift(local);
      }
      renderView();
      // Notifica freelancer se o status mudou para aprovado
      if (payload.eventType === 'UPDATE' && changed.status === 'approved' && changed.freelancer_id === STATE.currentUserId){
        addNotification({ type:'tx', title:'✅ Serviço aprovado!', body:`"${changed.title}" foi aprovado e já está visível no marketplace.`, link:'#/dashboard/freelancer' });
        toast('Seu serviço foi aprovado! 🎉', 'success');
      }
      if (payload.eventType === 'UPDATE' && changed.status === 'rejected' && changed.freelancer_id === STATE.currentUserId){
        addNotification({ type:'tx', title:'❌ Serviço rejeitado', body:`"${changed.title}": ${changed.rejected_reason || 'sem motivo informado'}.`, link:'#/dashboard/freelancer' });
        toast('Um serviço foi rejeitado. Veja detalhes no dashboard.', 'warn');
      }
    })
    .subscribe();
}

/* ──────────────────────────────────────────────────────────
 * CHAT — Supabase (tabela real: public.messages)
 *
 * Schema usado:
 *   id            UUID PRIMARY KEY DEFAULT gen_random_uuid()
 *   order_id      UUID NOT NULL REFERENCES orders(id) ON DELETE CASCADE
 *   sender_id     UUID NOT NULL REFERENCES profiles(id) ON DELETE CASCADE
 *   text          TEXT NOT NULL
 *   attachment_url TEXT          ← string simples (URL ou nome do arquivo)
 *   created_at    TIMESTAMPTZ DEFAULT NOW()
 *
 * RLS verifica via JOIN com orders (client_id ou freelancer_id = auth.uid())
 * Não existe receiver_id nem status — read receipts ficam só no frontend.
 * ────────────────────────────────────────────────────────── */

let _chatRealtimeChannel = null; // Canal Realtime ativo no momento

/**
 * Envia uma mensagem para a tabela `messages` do Supabase.
 * Requer que o pedido tenha um UUID real (order.sbId).
 * @param {string} sbOrderId  - UUID do pedido no Supabase (order.sbId)
 * @param {string} text       - Texto da mensagem
 * @param {string|null} attachmentUrl - URL ou nome do arquivo (opcional)
 * @returns {object|null} Row inserida ou null em caso de erro
 */
async function sbSendMessage(sbOrderId, text, attachmentUrl = null) {
  if (!sb || !STATE.sbProfile?.id || !sbOrderId) return null;
  const payload = {
    order_id:       sbOrderId,
    sender_id:      STATE.sbProfile.id,
    text:           text || '',
    attachment_url: attachmentUrl || null,
  };
  const { data, error } = await sb
    .from('messages')
    .insert(payload)
    .select()
    .single();
  if (error) {
    console.warn('[Supabase Chat] Erro ao enviar mensagem:', error.message);
    return null;
  }
  return data;
}

/**
 * Carrega o histórico de mensagens de um pedido da tabela `messages`.
 * Mescla com STATE.messages local — mantém mensagens locais com dataURL de imagem.
 * @param {object} order - Objeto de pedido (usa order.sbId como order_id)
 */
async function sbLoadMessages(order) {
  if (!sb || !STATE.sbProfile?.id || !order.sbId) return;
  const { data, error } = await sb
    .from('messages')
    .select('*')
    .eq('order_id', order.sbId)
    .order('created_at', { ascending: true });
  if (error) {
    console.warn('[Supabase Chat] Erro ao carregar mensagens:', error.message);
    return;
  }
  if (!data || !data.length) return;

  // Converte formato Supabase → formato local do STATE.messages
  const remote = data.map(m => ({
    id:         m.id,
    _sbId:      m.id,
    // sender_id é UUID do Supabase — minha própria UUID → STATE.currentUserId
    from:       m.sender_id === STATE.sbProfile.id ? STATE.currentUserId : m.sender_id,
    text:       m.text || '',
    // attachment_url vira um chip no bubble (sem dataURL para preview de imagem)
    attachments: m.attachment_url ? [{ name: m.attachment_url, size: '', type: '', dataURL: null }] : [],
    status:     'read', // mensagens antigas já foram lidas
    ts:         new Date(m.created_at).getTime(),
  }));

  // Mescla: preserva mensagens locais que têm dataURL (preview de imagem)
  const existing = STATE.messages[order.id] || [];
  const remoteIds = new Set(remote.map(r => r._sbId));
  const localOnly = existing.filter(l =>
    !l._sbId &&
    l.attachments?.some(a => a.dataURL)
  );
  const merged = [...remote, ...localOnly].sort((a, b) => a.ts - b.ts);
  STATE.messages[order.id] = merged;
}

/**
 * Abre canal Realtime para a tabela `messages` filtrado pelo order_id (sbId).
 * Mensagens novas do outro usuário chegam sem necessidade de refresh.
 * @param {object} order    - Objeto do pedido (precisa de order.sbId)
 * @param {boolean} ephemeral
 */
function sbSubscribeChat(order, ephemeral) {
  if (!sb || !STATE.sbProfile?.id || !order.sbId) return;

  // Cancela canal anterior se houver
  if (_chatRealtimeChannel) {
    sb.removeChannel(_chatRealtimeChannel);
    _chatRealtimeChannel = null;
  }

  _chatRealtimeChannel = sb
    .channel('chat-' + order.sbId)
    .on(
      'postgres_changes',
      {
        event:  'INSERT',
        schema: 'public',
        table:  'messages',
        filter: `order_id=eq.${order.sbId}`,
      },
      (payload) => {
        const m = payload.new;
        if (!m) return;

        // Ignora próprias mensagens (já inseridas localmente no submit)
        if (m.sender_id === STATE.sbProfile?.id) return;

        const localMsg = {
          id:          m.id,
          _sbId:       m.id,
          from:        m.sender_id, // UUID Supabase do remetente
          text:        m.text || '',
          attachments: m.attachment_url
            ? [{ name: m.attachment_url, size: '', type: '', dataURL: null }]
            : [],
          status:      'delivered',
          ts:          new Date(m.created_at).getTime(),
        };

        STATE.messages[order.id] = STATE.messages[order.id] || [];
        STATE.messages[order.id].push(localMsg);

        if (STATE.chatOpenOrderId === order.id) {
          // Chat aberto: re-renderiza imediatamente
          renderChat(order, ephemeral);
        } else {
          // Chat fechado: badge de notificação
          addNotification({
            type:  'message',
            title: 'Nova mensagem',
            body:  m.text ? m.text.slice(0, 80) : '📎 Arquivo recebido',
            link:  '#/dashboard/client',
          });
          renderHeader();
        }
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        console.log('[Supabase Chat] Realtime conectado para pedido', order.sbId);
      }
    });
}

/**
 * Cancela a assinatura Realtime do chat.
 * Chamado em closeChat().
 */
function sbUnsubscribeChat() {
  if (_chatRealtimeChannel && sb) {
    sb.removeChannel(_chatRealtimeChannel);
    _chatRealtimeChannel = null;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  initMock();
  DB.services.forEach(s => s._mock = true); // marca ANTES do Supabase sobrescrever
  const restored = restorePersistedData();
  startPersistence();
  bindRouter();
  // Proteção extra: se Supabase não está configurado, admin só mostra tela de login (STATE.isAdmin = false por padrão)

  // ── Auto-approve engine: run once on boot, then every 60 s ──
  runAutoApprove();
  setInterval(runAutoApprove, 60_000);


  // Re-render dashboard countdown banners every 60 s so timers stay accurate
  setInterval(()=>{
    const hasDelivered = STATE.orders.some(o => o.status === 'delivered');
    if (hasDelivered && ['dashboard'].includes(STATE.route)) render();
  }, 60_000);
  // Filter bar pinning disabled by request — bar is now static and scrolls with the page
  function bindFilterPin(){
    const bar = document.querySelector('.filters-sticky');
    const spacer = document.querySelector('.filters-sticky-spacer');
    if (bar) bar.classList.remove('is-pinned');
    if (spacer){ spacer.classList.remove('is-active'); spacer.style.height = '0px'; }
  }
  // Re-bind after every view render (innerHTML replacement loses listeners on children but window listener persists)
  const origRender = window.renderView;
  if (typeof origRender === 'function'){
    window.renderView = function(){ origRender.apply(this, arguments); setTimeout(bindFilterPin, 0); };
  }
  setTimeout(bindFilterPin, 100);

  // ── Supabase: inicializa auth
  if (SB_READY) {
    sbInitAuth().then(() => {
      sbLoadServices();
      sbSubscribeServices();
    });
  } else {
    // Marca serviços mock para diferenciá-los dos reais
    DB.services.forEach(s => s._mock = true);
  }
});

// 1. CARREGAR PERFIL DO USUÁRIO LOGADO
async function sbLoadProfile(userId) {
  if (!sb || !userId) return null;
  try {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();
    if (error) {
      console.warn('[Supabase] Erro ao carregar perfil:', error.message);
      return null;
    }
    console.log('✅ Perfil carregado:', profile.handle);
    return profile;
  } catch (err) {
    console.error('[Supabase] Erro ao carregar perfil:', err);
    return null;
  }
}

// 2. BUSCAR PERFIL POR HANDLE
async function sbGetProfileByHandle(handle) {
  if (!sb || !handle) return null;
  try {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('*')
      .eq('handle', handle)
      .single();
    if (error) {
      console.warn('[Supabase] Perfil não encontrado:', handle);
      return null;
    }
    return profile;
  } catch (err) {
    console.error('[Supabase] Erro ao buscar perfil:', err);
    return null;
  }
}

// 3. ATUALIZAR PERFIL DO USUÁRIO LOGADO
async function sbUpdateProfile(updates) {
  if (!sb || !STATE.sbUser?.id) {
    throw new Error('Usuário não autenticado');
  }
  try {
    const { data: updated, error } = await sb
      .from('profiles')
      .update({
        ...updates,
        updated_at: new Date().toISOString()
      })
      .eq('id', STATE.sbUser.id)
      .select()
      .single();
    if (error) throw error;
    STATE.sbProfile = updated;
    console.log('✅ Perfil atualizado');
    return updated;
  } catch (err) {
    console.error('[Supabase] Erro ao atualizar perfil:', err);
    throw err;
  }
}

// 4. REGISTRAR NOVO USUÁRIO
async function sbRegisterUser(email, password, name, role = 'freelancer') {
  if (!sb) throw new Error('Supabase não configurado');
  try {
    const { data: { user }, error: signUpError } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: {
          name,
          role,
          handle: email.split('@')[0]
        }
      }
    });
    if (signUpError) throw signUpError;
    console.log('✅ Usuário registrado:', user.id);
    return user;
  } catch (err) {
    console.error('[Supabase] Erro ao registrar:', err);
    throw err;
  }
}

// 5. LOGIN
async function sbLoginUser(email, password) {
  if (!sb) throw new Error('Supabase não configurado');
  try {
    const { data: { user }, error } = await sb.auth.signInWithPassword({
      email,
      password
    });
    if (error) throw error;
    console.log('✅ Login bem-sucedido:', user.email);
    return user;
  } catch (err) {
    console.error('[Supabase] Erro ao fazer login:', err);
    throw err;
  }
}

// 6. LOGOUT
async function sbLogoutUser() {
  if (!sb) return;
  try {
    const { error } = await sb.auth.signOut();
    if (error) throw error;
    STATE.sbProfile = null;
    console.log('✅ Logout bem-sucedido');
  } catch (err) {
    console.error('[Supabase] Erro ao fazer logout:', err);
  }
}

// 7. LISTAR TODOS OS FREELANCERS VERIFICADOS
async function sbListFreelancers(filters = {}) {
  if (!sb) return [];
  try {
    let query = sb
      .from('profiles')
      .select('*')
      .eq('verified', true)
      .eq('role', 'freelancer');
    if (filters.minRating) {
      query = query.gte('rating', filters.minRating);
    }
    const { data: freelancers, error } = await query
      .order('rating', { ascending: false });
    if (error) throw error;
    return freelancers || [];
  } catch (err) {
    console.error('[Supabase] Erro ao listar freelancers:', err);
    return [];
  }
}

// WEB3 — sbLoadProfileByWallet, sbLoadOrders, sbSyncITLBalance
// ════════════════════════════════════════════════════════════

async function sbLoadProfileByWallet(walletAddress) {
  if (!sb || !walletAddress) return null;
  try {
    const { data: profile, error } = await sb.from('profiles').select('*').eq('wallet_address', walletAddress.toLowerCase()).single();
    if (error) return null;
    STATE.sbProfile = profile;
    STATE.currentUserId = profile.id;
    return profile;
  } catch (err) {
    return null;
  }
}

async function sbLoadOrders() {
  if (!sb || !STATE.currentUserId) return [];
  try {
    const { data: orders, error } = await sb.from('orders').select('*').or(`client_id.eq.${STATE.currentUserId},freelancer_id.eq.${STATE.currentUserId}`);
    if (error) throw error;
    return orders || [];
  } catch (err) {
    return [];
  }
}

async function sbSyncITLBalance() {
  if (!sb || !STATE.currentUserId) return 0;
  try {
    const { data: profile, error } = await sb.from('profiles').select('balance_itl').eq('id', STATE.currentUserId).single();
    if (error) throw error;
    STATE.itlBalance = profile.balance_itl || 0;
    return STATE.itlBalance;
  } catch (err) {
    return 0;
  }
}
