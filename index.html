<script>
(function initReown() {
  const MAX = 50, DELAY = 100;
  let tries = 0;
  function tryInit() {
    tries++;
    const createAppKit = window.__ReownCreateAppKit;
    const EthersAdapter  = window.__ReownEthersAdapter;
    const nets           = window.__ReownNetworks;
    if (!createAppKit || !EthersAdapter || !nets) {
      if (tries < MAX) setTimeout(tryInit, DELAY);
      return;
    }
    try {
      const modal = createAppKit({
        adapters: [new EthersAdapter()],
        networks: [nets.bsc, nets.mainnet, nets.polygon],
        defaultNetwork: nets.bsc,
        projectId: '2ee67a36114285f54c77e2f785e69462',
        metadata: {
          name: 'Interwork',
          description: 'The workforce marketplace for the Interlink ecosystem',
          url: 'https://interwork.online',
          icons: ['https://interwork.online/favicon.png'],
        },
        themeMode: 'dark',
        features: { analytics: false, email: false, socials: false },
      });
      window._reownModal = modal;
      modal.subscribeAccount(function(account) {
        if (account && account.isConnected && account.address) {
          if (typeof window._handleReownConnected === 'function')
            window._handleReownConnected(account.address);
        } else {
          if (typeof window._handleReownDisconnected === 'function')
            window._handleReownDisconnected();
        }
      });
    } catch(e) {
      console.error('[Reown] Erro ao inicializar AppKit:', e);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInit);
  } else {
    tryInit();
  }
})();
</script>

/* ============ SBT — SOULBOUND REPUTATION TOKENS ============ */
const SBT_CONTRACT = '0xSBT0RepuT4tion1nterw0rk7C3AED1a73e8C0nTr4ct';
const SBT_BADGES = [
  { id:'human',    label:'Verified Human',  desc:'Proof of personhood via Interlink ID',     icon:'badge-check',  color:'#1a73e8', test: u => u.verified },
  { id:'linker',   label:'Interlink Linker',desc:'Active member of the Interlink ecosystem', icon:'link-2',       color:'#a78bfa', test: u => u.verified && (Date.now()-u.joinedTs) > 90*86400000 },
  { id:'veterano', label:'Veterano',        desc:'1+ ano no ecossistema',                    icon:'history',      color:'#7C3AED', test: u => (Date.now()-u.joinedTs) > 365*86400000 },
  { id:'cem',      label:'100+ Entregas',   desc:'Cem ou mais pedidos concluídos on-chain',  icon:'package-check',color:'#10b981', test: u => (u.jobs||0) >= 100 },
  { id:'top',      label:'Top Rated',       desc:'Rating ≥ 4.85 com 50+ avaliações',         icon:'award',        color:'#f59e0b', test: u => u.rating >= 4.85 && (u.jobs||0) >= 25 },
  { id:'fast',     label:'Express Pro',     desc:'Responde em ≤ 3h em média',                icon:'rocket',       color:'#ef4444', test: u => (u.responseHours||99) <= 3 },
  { id:'trust',    label:'Zero Disputas',   desc:'Nenhuma disputa em 20+ pedidos',           icon:'shield-check', color:'#06b6d4', test: u => ((u.disputes||0)===0) && (u.jobs||0) >= 20 },
  { id:'recur',    label:'Cliente Fiel',    desc:'90%+ de clientes recorrentes',             icon:'repeat',       color:'#0ea5e9', test: u => (u.repeatClientsPct||0) >= 90 },
];
function sbtTxForUser(uid, badgeId){
  // deterministic-ish hash so it stays stable per user+badge
  let h=0; const s=uid+':'+badgeId+':'+SBT_CONTRACT;
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  let out='0x'; let x=h;
  for(let i=0;i<64;i++){ x = (x*1103515245 + 12345) >>> 0; out += '0123456789abcdef'[(x>>>(i%24))&15]; }
  return out;
}
function sbtBadgesOf(u){
  return SBT_BADGES.filter(b => b.test(u)).map(b => ({
    ...b,
    tokenId: '#'+(Math.abs(u.id.charCodeAt(2)*7 + b.id.charCodeAt(0))%9000 + 1000),
    mintedTs: u.joinedTs + (b.id==='human'?86400000:30*86400000) + (b.id.charCodeAt(0)%10)*86400000,
    txHash: sbtTxForUser(u.id, b.id),
    block: 1840000 + (Math.abs(u.id.charCodeAt(2))*113 + b.id.charCodeAt(0)*7)%80000,
  }));
}
function chainHistoryOf(u){
  // Build immutable on-chain timeline: SBT mints + completed jobs + reviews
  const entries = [];
  sbtBadgesOf(u).forEach(b => entries.push({
    type:'sbt_mint', label:`SBT minted · ${b.label}`, icon:b.icon, color:b.color,
    ts:b.mintedTs, txHash:b.txHash, block:b.block, amount:null
  }));
  // completed orders for this freelancer
  STATE.orders?.filter(o=>o.freelancerId===u.id && (o.status==='approved'||o.status==='delivered')).forEach(o => {
    entries.push({
      type:'job_done', label:`Escrow liberado · ${(o.amount||0)} ITL`, icon:'package-check', color:'#10b981',
      ts:o.createdTs||Date.now(), txHash: o.escrowReleaseHash || sbtTxForUser(u.id,'job'+o.id), block: 1900000+(o.id||'').length, amount:o.amount
    });
  });
  // synthesize historic jobs based on u.jobs count (older proof of work)
  const synth = Math.min(u.jobs||0, 6);
  for(let i=0;i<synth;i++){
    entries.push({
      type:'job_done', label:`Pedido concluído · ${50+((i*73)%450)} ITL`, icon:'package-check', color:'#10b981',
      ts: u.joinedTs + (i+1)*((Date.now()-u.joinedTs)/(synth+1)),
      txHash: sbtTxForUser(u.id,'hist'+i), block: 1820000+i*271, amount: 50+((i*73)%450)
    });
  }
  return entries.sort((a,b)=>b.ts-a.ts);
}

/* Reverse helper so any *displayed* PT text gets translated to the active language. */
function tr(s){
  if (s == null) return s;
  if (STATE.language === 'en') return s;
  const txt = String(s);
  const key = txt.trim();
  if (!key) return s;
  const lead  = txt.match(/^\s*/)[0];
  const trail = txt.match(/\s*$/)[0];
  const entry = TR[key];
  if (entry && entry[STATE.language]){
    return lead + entry[STATE.language] + trail;
  }
  // Dynamic patterns: "PASSO 1", "PASSO 2", etc.
  const passo = key.match(/^PASSO\s+(\d+)$/i);
  if (passo){
    const w = TR['PASSO'] && TR['PASSO'][STATE.language];
    if (w) return lead + w + ' ' + passo[1] + trail;
  }
  return s;
}

/* Walk a DOM subtree and translate text nodes + common attributes. */
function applyTranslations(root){
  if (STATE.language === 'pt') return;
  const r = root || document.body;
  if (!r) return;
  // Text nodes
  try {
    const walker = document.createTreeWalker(r, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        if (!node.nodeValue) return NodeFilter.FILTER_REJECT;
        const trimmed = node.nodeValue.trim();
        if (!trimmed) return NodeFilter.FILTER_REJECT;
        const p = node.parentNode;
        if (!p) return NodeFilter.FILTER_REJECT;
        const tag = p.nodeName;
        if (tag==='SCRIPT'||tag==='STYLE'||tag==='CODE'||tag==='PRE'||tag==='TEXTAREA') return NodeFilter.FILTER_REJECT;
        if (p.closest && p.closest('[data-no-tr]')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes = [];
    let n; while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(node=>{
      const newVal = tr(node.nodeValue);
      if (newVal !== node.nodeValue) node.nodeValue = newVal;
    });
  } catch(e){}
  // Attributes
  const attrSel = '[placeholder],[title],[aria-label],[data-tr-attr]';
  const nodes = (r.querySelectorAll ? r.querySelectorAll(attrSel) : []);
  nodes.forEach(el=>{
    if (el.closest && el.closest('[data-no-tr]')) return;
    ['placeholder','title','aria-label'].forEach(a=>{
      const v = el.getAttribute(a);
      if (!v) return;
      const nv = tr(v);
      if (nv !== v) el.setAttribute(a, nv);
    });
  });
}

/* Auto-translate any future DOM insertion (toasts, modals, chat, notifications). */
function initI18nObserver(){
  if (window._i18nObserver || !document.body) return;
  const obs = new MutationObserver(muts=>{
    if (STATE.language === 'en') return;
    for (const m of muts){
      m.addedNodes && m.addedNodes.forEach(n=>{
        if (n.nodeType === 1) applyTranslations(n);
        else if (n.nodeType === 3 && n.parentNode){
          const nv = tr(n.nodeValue);
          if (nv !== n.nodeValue) n.nodeValue = nv;
        }
      });
    }
  });
  obs.observe(document.body, { childList:true, subtree:true, characterData:false });
  window._i18nObserver = obs;
}

function mkOrder(service, clientId, brief, status='in_progress', progress=10){
  const id = uid('o');
  const fee = +(service.price*0.02).toFixed(2);
  const createdTs = Date.now()-86400000*Math.floor(Math.random()*5+1);
  const deliveryAt = createdTs + service.deliveryDays*86400000;
  // Se o serviço tem campos de requirements, o pedido começa em awaiting_requirements
  // e o timer de delivery só inicia quando o cliente envia o briefing.
  const hasReqs = Array.isArray(service.requirements) && service.requirements.length > 0;
  const initialStatus = (status==='in_progress' && hasReqs) ? 'awaiting_requirements' : status;
  return {
    id, serviceId: service.id, freelancerId: service.freelancerId, clientId,
    brief, status: initialStatus, progress,
    tier: 'standard',
    selectedAddons: [],
    token: 'ITL',
    price: service.price, fee, total: +(service.price+fee).toFixed(2),
    deliveryDays: service.deliveryDays, createdTs, deliveryAt,
    deliveredAt: status==='delivered' ? Date.now()-3600000*4 : null,
    deliverable: status==='delivered' ? { files:[{name:'entrega_v1.zip', size:'4.2 MB'}], note:'Pronto para revisão!' } : null,
    rated: false,
    clientRated: false,
    escrowTx: txHash(),
    milestones: null,
    dispute: null,
    cancelRequest: null,
    refundRequested: false,
    tipITL: 0,
    // Pre-order requirements (Fiverr-style briefing form)
    requirementsAnswers: null,        // { [fieldId]: value }
    requirementsSubmitted: initialStatus !== 'awaiting_requirements',
    requirementsSubmittedTs: initialStatus !== 'awaiting_requirements' ? createdTs : null,
  };
}

function txHash(){ return '0x'+Array.from({length:64},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join(''); }
function explorerURL(hash){ return 'https://explorer.interlinklabs.ai/tx/'+hash; }
function shortHash(h){ return h.slice(0,10)+'…'+h.slice(-6); }
function tokenInfo(id){ return TOKENS.find(t=>t.id===id) || TOKENS[0]; }
function priceInToken(itl, token){
  const t = tokenInfo(token); return +(itl*t.rateITL).toFixed(2);
}
function fmtToken(amount, token){
  const t = tokenInfo(token); return amount.toLocaleString('en-US',{maximumFractionDigits:2})+' '+t.label;
}
function diffCountdown(ms){
  if (ms<=0) return 'Vencido';
  const d=Math.floor(ms/86400000), h=Math.floor((ms%86400000)/3600000), m=Math.floor((ms%3600000)/60000);
  if (d>0) return `${d}d ${h}h`;
  if (h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

/* ---------- AVATAR ---------- */
function pickAvatarFile(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.capture = 'user';
  input.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ toast('Selecione uma imagem','warn'); return; }
    if(file.size > 3*1024*1024){ toast('Máx 3MB','warn'); return; }
    const reader = new FileReader();
    reader.onload = function(ev){
      STATE._avatarPhoto = ev.target.result;
      updateAvatarPreview(ev.target.result);
      selectAvatarOpt('upload');
      toast('Foto carregada!','success');
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
function updateAvatarPreview(url){
  const el = document.getElementById('avatar-preview');
  if(el) el.innerHTML = '<img src="'+url+'" alt="foto"/>';
}
function selectAvatarOpt(opt){
  STATE._avatarOpt = opt;
  document.querySelectorAll('.avatar-option').forEach(function(el){ el.classList.remove('on'); });
  const sel = document.querySelector('.avatar-option[data-opt="'+opt+'"]');
  if(sel) sel.classList.add('on');
}

function render(){

function renderView(){
  const v = $('#view');
  if (!v) return;

  // Scroll to top whenever the "what we're showing" actually changes
  // (route, category, query, country) — but NOT on simple pagination clicks.
  const viewSig = [STATE.route, STATE.category, STATE.query, STATE.country].join('|');
  if (STATE._viewSig !== viewSig) {
    STATE._viewSig = viewSig;
    requestAnimationFrame(()=>{ window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' }); });
  }

  switch(STATE.route){
    case 'service':  v.innerHTML = viewService(STATE.selectedServiceId); break;
    case 'favorites':v.innerHTML = isAuthed() ? viewFavorites() : viewAuthRequired(); break;
    case 'dashboard':v.innerHTML = isAuthed() ? viewDashboard() : viewAuthRequired(); break;
    case 'wallet':   v.innerHTML = isAuthed() ? viewWallet() : viewAuthRequired(); break;
    case 'how':      v.innerHTML = viewHow(); break;
    case 'overview': v.innerHTML = viewOverview(); break;
    case 'benefits': v.innerHTML = viewBenefits(); break;
    case 'rewards':  v.innerHTML = viewRewards(); break;
    case 'legal':    v.innerHTML = viewLegal(STATE.selectedLegalPage || 'faq'); break;
    case 'u':        v.innerHTML = viewProfile(STATE.selectedProfileHandle); break;
    case 'admin':    v.innerHTML = viewAdmin(); break;
    case 'new-service': v.innerHTML = isAuthed() ? viewNewServicePage() : viewAuthRequired(); break;
    case 'new-service': v.innerHTML = isAuthed() ? viewNewServicePage() : viewAuthRequired(); break;
    case 'home':
    default:         v.innerHTML = viewHome();
  }
  // Re-render header after view change so transparent/white state is correct
  renderHeader();
  icons();
  bindViewEvents();
  applyTranslations(v);
}

    const atStart = strip.scrollLeft <= 2;
    const atEnd   = strip.scrollLeft + strip.clientWidth >= strip.scrollWidth - 2;
    btnL.classList.toggle('hidden', atStart);
    btnR.classList.toggle('hidden', atEnd);
  }
  strip.addEventListener('scroll', updateArrows, {passive:true});
  // Use ResizeObserver to re-check when window resizes
  if(window.ResizeObserver){
    new ResizeObserver(updateArrows).observe(strip);
  }
  updateArrows();
  // Scroll active button into view APENAS se estiver fora da área visível
  const active = strip.querySelector('.cat-strip-btn--active');
  if(active){
    const r = active.getBoundingClientRect();
    const sr = strip.getBoundingClientRect();
    const outLeft  = r.left < sr.left + 32;
    const outRight = r.right > sr.right - 32;
    if(outLeft || outRight){
      setTimeout(()=>{
        const offset = active.offsetLeft - (strip.clientWidth/2) + (active.clientWidth/2);
        strip.scrollTo({left: Math.max(0, offset), behavior:'smooth'});
      }, 60);
    }
  }
}
function catStripScroll(dir){
  const strip = document.getElementById('cat-strip');
  if(!strip) return;
  strip.scrollBy({left: dir*200, behavior:'smooth'});
  setTimeout(()=>{
    const btnL=document.getElementById('cat-arrow-l');
    const btnR=document.getElementById('cat-arrow-r');
    if(!strip||!btnL||!btnR) return;
    btnL.classList.toggle('hidden', strip.scrollLeft <= 2);
    btnR.classList.toggle('hidden', strip.scrollLeft+strip.clientWidth >= strip.scrollWidth-2);
  }, 350);
}

function openConnectWallet(reason) {
  // Modal nativo do Reown: QR real + "All Wallets" com 530+ carteiras
  if (window._reownModal) {
    window._reownModal.open();

  }
  // SDK ainda carregando (module async) — aguarda até 6s
  toast('Carregando carteiras...', 'warn');
  let tries = 0;
  const poll = setInterval(() => {
    tries++;
    if (window._reownModal) {
      clearInterval(poll);

      return;
    }
    if (tries > 20) {
      clearInterval(poll);

    }
  }, 300);
}

// Chamado pelo módulo Reown quando carteira conecta com sucesso
window._handleReownConnected = async function(address) {
  // ── ADICIONADO: garante sessão real no Supabase (Anonymous Auth) ligada à wallet ──
  try {
    if (typeof sb !== 'undefined' && sb) {
      let { data: sessionData } = await sb.auth.getSession();
      if (!sessionData.session) {
        const { error: signInError } = await sb.auth.signInAnonymously({
          options: { data: { wallet: address, name: 'Usuário', role: 'client' } }
        });
        if (signInError) console.warn('[Supabase] Erro no login anônimo:', signInError.message);
      }
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        await sb.from('profiles').update({ wallet_address: address }).eq('id', user.id);
        STATE.sbProfile = await sbLoadProfile(user.id);
      }
    }
  } catch (e) {
    console.warn('[Supabase] Falha ao sincronizar sessão da wallet:', e);
  }
  // ── A PARTIR DAQUI: código original, 100% intacto ──
  const shortW = address.slice(0,6) + '...' + address.slice(-4);
  const me = getUser(STATE.currentUserId) || DB.users[0];
  if (!STATE.onboardingComplete) {
    me.name    = 'Usuário';
    me.handle  = shortW + '.interlink';
    me.wallet  = address;
    var av     = getAvatarSrc('U', '#1a73e8');
    me.avatar  = av.src;
    me.avatarType = av.type;
    me.bio     = 'Cliente Web3 explorando serviços na Interwork.';
    me.verified = true;
    me.online  = true;
    STATE.userRole          = 'client';
    STATE.onboardingComplete = true;
    STATE.dashboardTab      = 'client';
  } else {
    me.wallet = address;
  }
  STATE.walletProvider  = 'WalletConnect';
  STATE.walletConnected = true;
  STATE.authenticated   = true;
  closeModal();
  // toast removido — sem popup ao conectar
  persistNow();
  render();
};

function finishWalletOnboarding(provider){
  const name = ($('#ob-name')?.value || '').trim();

  const fullHandle = handleRaw + '.interlink';
  const taken = DB.users.some(u => u.id !== STATE.currentUserId && (u.handle||'').toLowerCase() === fullHandle);

  const me = getUser(STATE.currentUserId) || DB.users[0];

  if ($('#wd-receive')) $('#wd-receive').textContent = fmtITL(amount);

function stars(n, size='w-4 h-4'){
  const full = Math.floor(n), half = (n-full)>=0.5;
  let html='';
  for (let i=0;i<5;i++){
    const cls = i<full ? 'text-amber-400 fill-amber-400' : (i===full && half ? 'text-amber-400' : 'text-ink-300');
    html += `<i data-lucide="star" class="${size} ${cls}"></i>`;
  }
  return `<div class="flex items-center gap-0.5">${html}</div>`;
}

}
function levelChip(level, size='sm'){
  if (!level) return '';
  const cls = size==='xxs' ? 'text-[10px] px-1.5 py-0.5 gap-0.5' : 'text-[11px] px-2 py-0.5';

/* ---------- WORK VAULT — 7-step visual progress stepper ---------- */
const ORDER_STEPS = [
  { key:'create',   label:'Pedido criado',     icon:'file-plus' },
  { key:'accept',   label:'Termos aceitos',    icon:'handshake' },
  { key:'payment',  label:'Pagamento seguro',  icon:'lock' },
  { key:'progress', label:'Em andamento',      icon:'hammer' },
  { key:'delivery', label:'Entrega enviada',   icon:'package' },
  { key:'review',   label:'Em revisão',        icon:'search-check' },
  { key:'done',     label:'Concluído',         icon:'check-circle-2' },
];
function orderStepState(o){
  if (o.status === 'cancelled') return { cancelled:true, activeIndex:-1, doneUpTo:-1, disputed:false };
  if (o.status === 'disputed')  return { disputed:true, activeIndex:5, doneUpTo:4, cancelled:false };
  const map = { awaiting_requirements:3, in_progress:3, awaiting_delivery:3, delivered:5, approved:6 };
  const idx = map[o.status] ?? 3;
  const doneUpTo = o.status === 'approved' ? 6 : idx - 1;
  return { activeIndex: idx, doneUpTo, disputed:false, cancelled:false };
}
function orderProgressStepper(o, opts={}){
  const compact = !!opts.compact;
  const st = orderStepState(o);
  if (st.cancelled){
    return `<div class="flex items-center gap-1.5 text-xs text-ink-500 font-semibold"><i data-lucide="x-circle" class="w-4 h-4 text-slate-400" aria-hidden="true"></i>Pedido cancelado</div>`;
  }
  const stepHtml = (step,i)=>{
    const isDone = i <= st.doneUpTo;
    const isDisputed = st.disputed && i === st.activeIndex;
    const isCurrent = i === st.activeIndex && !isDone && !isDisputed;
    const circleCls = isDisputed ? 'bg-rose-500 text-white' : isDone ? 'bg-emerald-500 text-white' : isCurrent ? 'bg-brand-500 text-white animate-pulse' : 'bg-ink-100 text-ink-400';
    const iconName = isDisputed ? 'alert-triangle' : (isDone ? 'check' : step.icon);
    const lineCls = i < st.doneUpTo ? 'bg-emerald-400' : 'bg-ink-100';
    const isLast = i === ORDER_STEPS.length-1;
    return `
    <div class="flex-1 flex flex-col items-center min-w-0" title="${escapeHtml(step.label)}">
      <div class="w-full flex items-center">
        <div class="w-5 h-5 md:w-6 md:h-6 rounded-full grid place-items-center ${circleCls} shrink-0">
          <i data-lucide="${iconName}" class="w-3 h-3 md:w-3.5 md:h-3.5" aria-hidden="true"></i>
        </div>
        ${isLast ? '' : `<div class="flex-1 h-0.5 ${lineCls}"></div>`}
      </div>
      ${compact?'':`<span class="text-[9px] mt-1 text-center leading-tight ${isDone||isCurrent||isDisputed?'text-ink-700 font-semibold':'text-ink-400'}">${step.label}</span>`}
    </div>`;
  };
  return `
  <div class="flex items-start" role="img" aria-label="Progresso do pedido: ${ORDER_STEPS[Math.max(st.activeIndex,0)].label}">
    ${ORDER_STEPS.map(stepHtml).join('')}
  </div>`;
}
function workVaultBadge(o){
  if (o.status === 'cancelled' || o.status === 'approved') return '';
  return `

}

function filterServices(){
  // reseta a página pra 1 sempre que algum filtro/busca/ordenação mudar
  const sig = [STATE.category,STATE.country,STATE.ratingMin,STATE.priceMax,STATE.priceMin,STATE.verifiedOnly,STATE.availableOnly,STATE.sort,STATE.query,STATE.trendingActive].join('|');
  if (STATE._filterSig !== sig){ STATE._filterSig = sig; STATE.page = 1; }
  let arr = DB.services.filter(sv=>!sv.status||sv.status==='approved');
  if (STATE.category!=='all') arr = arr.filter(s=>s.category===STATE.category);
  if (STATE.country!=='all')  arr = arr.filter(s=>s.country===STATE.country);
  if (STATE.ratingMin>0)      arr = arr.filter(s=>s.rating>=STATE.ratingMin);
  if (STATE.priceMax>0)       arr = arr.filter(s=>s.price<=STATE.priceMax);
  if (STATE.priceMin>0)       arr = arr.filter(s=>s.price>=STATE.priceMin);
  if (STATE.verifiedOnly)     arr = arr.filter(s=>{ const u=getUser(s.freelancerId); return u && u.verified; });
  if (STATE.availableOnly)    arr = arr.filter(s=>{ const u=getUser(s.freelancerId); return u && u.online; });

  // ALTERADO — busca local agora calcula um score de relevância por serviço, em vez de só
  // filtrar por .includes(). Continua 100% local (sem mudar o banco): título pesa mais que
  // descrição, que pesa mais que tags/categoria/nome do freelancer. Quando há busca de texto
  // e nenhum sort manual foi escolhido, a lista é ordenada pelo score (mais relevante primeiro).
  let searchScores = null;
  if (STATE.query){
    const q = STATE.query.toLowerCase().trim();
    const terms = q.split(/\s+/).filter(Boolean);
    searchScores = new Map();
    arr = arr.filter(s => {
      const title = s.title.toLowerCase();
      const desc  = s.description.toLowerCase();
      const tags  = (s.tags||[]).join(' ').toLowerCase();
      const cat   = getCategory(s.category).label.toLowerCase();
      const freelancerName = (getUser(s.freelancerId)?.name || '').toLowerCase();

      let score = 0;
      let matched = false;
      for (const term of terms){
        if (title===q) score += 100; // título idêntico à busca inteira
        if (title.startsWith(term)) { score += 50; matched = true; }
        else if (title.includes(term)) { score += 30; matched = true; }
        if (desc.includes(term))           { score += 10; matched = true; }
        if (tags.includes(term))           { score += 15; matched = true; }
        if (cat.includes(term))            { score += 8;  matched = true; }
        if (freelancerName.includes(term)) { score += 5;  matched = true; }
      }
      if (!matched) return false;
      searchScores.set(s.id, score);
      return true;
    });
  }

  switch(STATE.trendingActive ? 'trending' : STATE.sort){
    case 'rating':     arr.sort((a,b)=>b.rating-a.rating); break;
    case 'price_asc':  arr.sort((a,b)=>a.price-b.price); break;
    case 'price_desc': arr.sort((a,b)=>b.price-a.price); break;
    case 'recent':     arr.sort((a,b)=>b.createdTs-a.createdTs); break;
    default:
      // ADICIONADO — quando há busca de texto e a ordenação é a padrão (relevância),
      // usa o score calculado acima em vez do antigo rating*reviewsCount.
      if (searchScores) arr.sort((a,b)=>searchScores.get(b.id)-searchScores.get(a.id));
      else arr.sort((a,b)=>(b.rating*b.reviewsCount)-(a.rating*a.reviewsCount));
  }
  return arr;
}

const PAGE_SIZE = 24; // itens por página na listagem de serviços

function paginationBar(totalItems, opts={}){
  const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
  if (totalPages <= 1) return '';
  const cur = Math.min(Math.max(1, STATE.page||1), totalPages);
  const onPage = opts.onPage || 'goToPage';
  const windowSize = 10;
  let pages = [];
  if (totalPages <= windowSize){
    pages = Array.from({length:totalPages}, (_,i)=>i+1);
  } else {
    const start = Math.max(2, cur-3);
    const end = Math.min(totalPages-1, cur+3);
    pages = [1];
    if (start>2) pages.push('...');
    for(let i=start;i<=end;i++) pages.push(i);
    if (end<totalPages-1) pages.push('...');
    pages.push(totalPages);
  }
  return `
  <nav class="pgn-wrap" aria-label="Paginação">
    <button onclick="${onPage}(${cur-1})" ${cur===1?'disabled':''} aria-label="Página anterior" class="pgn-arrow">
      <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
    </button>
    ${pages.map(p => p==='...'
      ? `<span class="pgn-dots">…</span>`
      : `<button onclick="${onPage}(${p})" aria-current="${p===cur?'page':'false'}" class="pgn-btn${p===cur?' pgn-btn--active':''}">${p}</button>`
    ).join('')}
    <button onclick="${onPage}(${cur+1})" ${cur===totalPages?'disabled':''} aria-label="Próxima página" class="pgn-arrow">
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
    </button>
  </nav>`;
}
function goToPage(p){
  STATE.page = Math.max(1, p);

  // Duplo rAF garante que o DOM foi pintado antes do scroll
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function gigCarouselStep(ev, serviceId, dir){
  ev.preventDefault();
  ev.stopPropagation();
  const wrap = ev.currentTarget.closest('.gig-carousel');
  if (!wrap) return;
  const count = parseInt(wrap.dataset.imgcount, 10) || 1;
  if (count <= 1) return;
  let idx = parseInt(wrap.dataset.idx, 10) || 0;
  idx = (idx + dir + count) % count;
  wrap.dataset.idx = idx;
  wrap.querySelectorAll('img[data-slide]').forEach(img => {
    img.classList.toggle('opacity-100', parseInt(img.dataset.slide,10) === idx);
    img.classList.toggle('opacity-0', parseInt(img.dataset.slide,10) !== idx);
  });
  wrap.querySelectorAll('[data-dot]').forEach(dot => {
    const on = parseInt(dot.dataset.dot,10) === idx;
    dot.classList.toggle('bg-white', on);
    dot.classList.toggle('bg-white/50', !on);
  });
}

/* ---------- Reviews — Fiverr-style breakdown, search, sort, helpful votes ---------- */
function reviewDistribution(s){
  const total = s.reviewsCount || s.reviews.length || 0;
  if (!total) return [0,0,0,0,0];
  const r = s.rating || 5;
  const ratios = r>=4.8 ? [0.93,0.05,0.01,0.005,0.005]
              : r>=4.5 ? [0.82,0.12,0.04,0.01,0.01]
              : r>=4.0 ? [0.65,0.20,0.10,0.03,0.02]
              :          [0.45,0.25,0.15,0.10,0.05];
  const dist = ratios.map(x=>Math.round(x*total));
  const diff = total - dist.reduce((a,b)=>a+b,0);
  dist[0] += diff;
  return dist; // [5★,4★,3★,2★,1★]
}
function ensureReviewUIState(serviceId){
  if (STATE.reviewUIServiceId !== serviceId){
    STATE.reviewUIServiceId = serviceId;
    STATE.reviewSort = 'relevant';
    STATE.reviewQuery = '';
    STATE.reviewOnlyChain = false;
  }
}
function setReviewSort(v){ STATE.reviewSort = v; renderView(); }
function setReviewQuery(v){ STATE.reviewQuery = v; renderView(); }
function toggleReviewOnlyChain(){ STATE.reviewOnlyChain = !STATE.reviewOnlyChain; renderView(); }
function visibleReviews(s){
  let list = [...s.reviews];
  const q = (STATE.reviewQuery||'').toLowerCase().trim();
  if (q) list = list.filter(r => r.text.toLowerCase().includes(q) || (getUser(r.userId)?.name||'').toLowerCase().includes(q));
  if (STATE.reviewOnlyChain) list = list.filter(r => !!r.txHash);
  if (STATE.reviewSort === 'recent') list.sort((a,b)=>b.ts-a.ts);
  else if (STATE.reviewSort === 'rating_high') list.sort((a,b)=>b.stars-a.stars);
  else if (STATE.reviewSort === 'rating_low') list.sort((a,b)=>a.stars-b.stars);
  else list.sort((a,b)=>(b.stars*1000+b.ts/1e10)-(a.stars*1000+a.ts/1e10)); // relevant: rating then recency
  return list;
}
function hashSeed(str){ let h=0; for (let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))>>>0; } return h; }
function baseHelpful(reviewId){
  const h = hashSeed(reviewId);
  return { yes: 3 + (h%9), no: h%2 };
}
function markReviewHelpful(reviewId, val){
  STATE.reviewVotes = STATE.reviewVotes || {};
  if (STATE.reviewVotes[reviewId]) return; // already voted, keep it simple
  STATE.reviewVotes[reviewId] = val;
  renderView();
}

  const completed = STATE.orders.filter(o=>o.clientId===STATE.currentUserId && o.status==='approved');

}

    return `<span class="chip bg-orange-50 text-orange-700"><i data-lucide="hourglass" class="w-3.5 h-3.5"></i>Cancelamento solicitado</span>`;

  if (o.status==='awaiting_requirements'){

/* ---------- ORDER ACTIONS ---------- */
function actorIdForPerspective(o, perspective){
  return perspective === 'freelancer' ? o.freelancerId : o.clientId;
}
function cancelOrder(orderId, perspective='client'){
  if (!requireAuth('cancelar pedidos')) return;
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o){ toast('Pedido não encontrado.', 'error'); return; }
  if (['approved','cancelled'].includes(o.status)){ toast('Este pedido não pode ser cancelado.', 'warn'); return; }
  const actorId = actorIdForPerspective(o, perspective);
  const actor = getUser(actorId);

  if (o.status === 'awaiting_requirements'){
    if (!confirm('Cancelar antes do formulário? O reembolso integral será liberado automaticamente.')) return;
    finalizeCancellation(o, 'briefing_not_sent', o.total || 0, actorId);
    toast('Pedido cancelado. Reembolso integral liberado.', 'success');
    render();
    return;
  }

  if (!confirm('Pedido já iniciado. Enviar solicitação de cancelamento para acordo mútuo?')) return;
  o.cancelRequest = { by: actorId, byRole: perspective, ts: Date.now(), status:'pending' };
  STATE.messages[o.id] = STATE.messages[o.id] || [];
  STATE.messages[o.id].push({
    from: actorId,
    text: `Solicitação de cancelamento enviada por ${actor?.name || 'usuário'}. Se a outra parte aceitar, o escrow será reembolsado ao cliente.`,
    ts: nowTs()
  });
  addNotification({ type:'cancel', title:'Cancelamento solicitado', body:`Pedido #${o.id.slice(-5)} aguardando acordo mútuo.`, link:'#/dashboard/'+(perspective==='client'?'freelancer':'client') });
  toast('Solicitação de cancelamento enviada.', 'info');
  render();
}
function acceptCancellation(orderId, perspective='freelancer'){
  if (!requireAuth('aceitar cancelamento')) return;
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o || !o.cancelRequest){ toast('Nenhuma solicitação pendente.', 'warn'); return; }
  if (!confirm('Aceitar cancelamento? O escrow será reembolsado ao cliente.')) return;
  finalizeCancellation(o, 'mutual_agreement', o.total || 0, actorIdForPerspective(o, perspective));
  toast('Cancelamento aceito. Escrow reembolsado ao cliente.', 'success');
  render();
}
function finalizeCancellation(o, reason, refundAmount, actorId){
  const hash = txHash();
  const client = getUser(o.clientId);
  if (client) client.balanceITL = +((client.balanceITL || 0) + refundAmount).toFixed(4);
  o.status = 'cancelled';
  o.progress = 100;
  o.cancelledAt = Date.now();
  o.cancellation = { reason, refundAmount, txHash: hash, by: actorId, ts: Date.now() };
  o.cancelRequest = null;
  STATE.txHistory.unshift({ hash, type:'order_cancel_refund', amount:refundAmount, token:'ITL', orderId:o.id, ts:Date.now() });
  STATE.messages[o.id] = STATE.messages[o.id] || [];
  STATE.messages[o.id].push({ from:actorId, text:`Pedido cancelado. Reembolso de ${fmtITL(refundAmount)} confirmado via ${shortHash(hash)}.`, ts:nowTs() });
  addNotification({ type:'cancel', title:'Pedido cancelado', body:`Reembolso de ${fmtITL(refundAmount)} confirmado • ${shortHash(hash)}`, link:'#/dashboard/client' });
  persistNow();
}

function approveOrder(orderId){
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o) { toast('Pedido não encontrado.', 'error'); return; }
  if (o.status !== 'delivered') { toast('Aguarde a entrega antes de aprovar.', 'warn'); return; }
  const hash = txHash();
  o.releaseTx = hash;
  o.status='approved'; o.progress=100; o.approvedAt = Date.now();
  // Credit the freelancer balance so the payout is real, not just a notification
  const fl = getUser(o.freelancerId);
  if (fl){
    fl.balanceITL = (fl.balanceITL || 0) + (o.price || 0);
    fl.jobs = (fl.jobs || 0) + 1;
  }
  STATE.txHistory.unshift({ hash, type:'escrow_release', amount:o.price, token:'ITL', ts:Date.now(), orderId:o.id });
  // Confirmation for the client (the one who pressed approve)
  addNotification({ type:'tx', title:'Pagamento liberado', body:`${fmtITL(o.price)} liberados ao freelancer • ${shortHash(hash)}`, link:'#/dashboard/client' });
  // Notification for the freelancer — this is what was missing
  const svc = getService(o.serviceId);
  addNotification({
    type:'tx',
    title:'Entrega aprovada',
    body:`Você recebeu ${fmtITL(o.price)}${svc?` por "${svc.title}"`:''} • ${shortHash(hash)}`,
    link:'#/dashboard/freelancer'
  });
  // Drop a system message in the chat so the freelancer sees the release inline
  STATE.messages[o.id] = STATE.messages[o.id] || [];
  STATE.messages[o.id].push({ from:o.clientId, text:`✅ Entrega aprovada. ${fmtITL(o.price)} liberados via ${shortHash(hash)}.`, ts:nowTs() });
  toast('Entrega aprovada. ITL liberado via tx '+shortHash(hash), 'success');
  render();
  setTimeout(()=>openRateModal(orderId), 300);
}

function releaseMilestone(orderId, milestoneId){
  if (!requireAuth('liberar milestone')) return;
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o || !o.milestones){ toast('Pedido sem milestones.', 'warn'); return; }
  const ms = o.milestones.find(m=>m.id===milestoneId);
  if (!ms){ toast('Milestone não encontrado.', 'warn'); return; }
  if (ms.status !== 'pending'){ toast('Essa etapa já foi liberada ou ainda está bloqueada.', 'warn'); return; }

  const hash = txHash();
  ms.status = 'released';
  ms.releaseTx = hash;
  ms.releasedAt = Date.now();

  // Credit freelancer
  const fl = getUser(o.freelancerId);
  if (fl) fl.balanceITL = +((fl.balanceITL||0) + ms.amountITL).toFixed(2);

  // Unlock the next milestone
  const nextLocked = o.milestones.find(m=>m.status==='locked');
  if (nextLocked) nextLocked.status = 'pending';

  // If all milestones released, mark order approved
  const allDone = o.milestones.every(m=>m.status==='released');
  if (allDone){
    o.status = 'approved';
    o.approvedAt = Date.now();
    o.progress = 100;
    if (fl) fl.jobs = (fl.jobs||0) + 1;
  }

  STATE.txHistory.unshift({ hash, type:'milestone_release', amount: ms.amountITL, token:'ITL', ts:Date.now(), orderId });
  addNotification({ type:'tx', title:`Milestone ${ms.pct}% liberado`, body:`${fmtITL(ms.amountITL)} → ${getUser(o.freelancerId)?.name||'freelancer'} • ${shortHash(hash)}`, link:'#/dashboard/client' });
  STATE.messages[orderId] = STATE.messages[orderId] || [];
  STATE.messages[orderId].push({ from:o.clientId, text:`💸 Etapa "${ms.name}" liberada — ${fmtITL(ms.amountITL)} enviados via ${shortHash(hash)}.${nextLocked?' Próxima etapa desbloqueada.':''}`, ts:nowTs() });

  persistNow();
  toast(`Milestone "${ms.name}" liberado — ${fmtITL(ms.amountITL)} on-chain`, 'success');
  render();
  if (allDone) setTimeout(()=>openRateModal(orderId), 400);
}

function rateSetMain(n){
  const wrap = document.getElementById('rate-stars');
  if(!wrap) return;
  wrap.dataset.val = n;
  const labels = ['','Péssimo','Ruim','Regular','Bom','Excelente'];
  const lbl = document.getElementById('rate-label');
  if(lbl){ lbl.textContent = labels[n]||''; lbl.style.color = n>=4?'#f59e0b':n>=3?'#6b7280':'#ef4444'; }
  // Atualizar visual de cada botão — usar data-lucide só para SVG já existente
  document.querySelectorAll('#rate-stars .star-btn').forEach((btn,idx) => {
    const lit = idx < n;
    const ic = btn.querySelector('i,svg');
    if(!ic) return;
    // Tailwind classes via classList
    ic.classList.toggle('fill-amber-400', lit);
    ic.classList.toggle('text-amber-400', lit);
    ic.classList.toggle('fill-slate-200',  !lit);
    ic.classList.toggle('text-slate-300',  !lit);
    // Remover classes opostas
    if(lit){ ic.classList.remove('fill-slate-200','text-slate-300'); }
    else   { ic.classList.remove('fill-amber-400','text-amber-400'); }
  });
}

function rateHover(n){
  $$('#rate-stars .star-btn i').forEach((ic,idx) => {
    const lit = idx < n;
    ic.classList.toggle('fill-amber-300', lit);

  });
}

function rateUnhover(){

function rateSubStar(id, n){

function submitRate(orderId){
  const o = STATE.orders.find(x=>x.id===orderId);
  if(!o){ toast('Pedido não encontrado.','warn'); return; }
  if(o.rated){ toast('Você já avaliou este pedido.','info'); return; }

  const starsWrap = $('#rate-stars');
  const stars = starsWrap ? +starsWrap.dataset.val : 5;
  if(stars < 1 || stars > 5){ toast('Selecione uma nota de 1 a 5.','warn'); return; }

  const text = (document.getElementById('rate-text')?.value||'').trim() || 'Sem comentários.';
  const commStars    = +document.getElementById('rate-comm-stars')?.dataset.val    || stars;
  const qualityStars = +document.getElementById('rate-quality-stars')?.dataset.val || stars;
  const deadlineStars= +document.getElementById('rate-deadline-stars')?.dataset.val|| stars;

  const s  = getService(o.serviceId);
  const fu = getUser(o.freelancerId);
  const hash = txHash();

  // Salvar review no serviço
  s.reviews = s.reviews || [];
  s.reviews.unshift({
    id:       uid('r'),
    userId:   o.clientId,
    text,
    stars,
    subRatings: { communication: commStars, quality: qualityStars, deadline: deadlineStars },
    ts:       nowTs(),
    txHash:   hash,
    orderId:  o.id,
  });
  s.reviewsCount = (s.reviewsCount||0) + 1;
  // Recalcular rating do serviço (média ponderada)
  const allStars = s.reviews.map(r=>r.stars);
  s.rating = +(allStars.reduce((a,b)=>a+b,0)/allStars.length).toFixed(2);

  // Recalcular rating do freelancer
  if(fu){
    const myOrders = STATE.orders.filter(ord=>ord.freelancerId===fu.id && ord.rated);
    const avgStars = myOrders.length
      ? +(myOrders.reduce((acc,ord)=>{
          const sv = getService(ord.serviceId);
          const rv = sv?.reviews?.find(r=>r.orderId===ord.id);
          return acc + (rv?.stars||5);
        },0) / myOrders.length).toFixed(2)
      : stars;
    fu.rating = +avgStars;
    fu.jobs = (fu.jobs||0) + 1; // contabiliza job completo
  }

  o.rated   = true;
  o.ratingTx = hash;
  o.reviewStars = stars;

  STATE.txHistory.unshift({ hash, type:'rating', amount:0, token:'ITL', ts:Date.now(), orderId:o.id });
  addNotification({
    type:'rating',
    title:'Avaliação registrada on-chain',
    body:`${stars}★ para ${escapeHtml(fu?.name||'freelancer')} • ${shortHash(hash)}`,
    link:'#/dashboard/client'
  });
  // Notificar freelancer
  addNotification({
    type:'rating',
    title:`Nova avaliação: ${stars}★`,
    body:`"${text.slice(0,60)}${text.length>60?'…':''}"`,
    link:'#/dashboard/freelancer'
  });

  closeModal();
  toast(`${stars}★ Avaliação publicada on-chain`, 'success');
  render();
  maybeOfferATV(orderId);
}

function maybeOfferATV(orderId){

  // de um pedido aprovado, independente de qual caminho levou até aqui (aprovação direta,
  // milestone final liberado, ou avaliação tardia via card do pedido).
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o || o.status !== 'approved') return;
  if (o._atvOffered) return; // já oferecemos pra esse pedido, não repete
  o._atvOffered = true;
  setTimeout(() => showATVChoice(orderId), 350);
}

  /* ── STEP 2 ── */

    </div>
    <div class="border-t border-ink-100 pt-4">
      <div class="flex items-center justify-between mb-1.5">

        <button type="button" onclick="addFaq()" class="text-xs font-bold text-brand-600 hover:text-brand-700 flex items-center gap-1">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>Adicionar pergunta

    <div class="border-t border-ink-100 pt-4">

      <p class="text-[11px] text-ink-400 mb-2">O cliente preenche antes de pagar — você recebe tudo que precisa para começar.</p>

  /* ── STEP 3 ── */
  const gPrev = (STATE.newServiceGallery||[]).map((src,i)=>`
    <div class="relative group aspect-square rounded-xl overflow-hidden border border-ink-100">
      <img src="${src}" class="w-full h-full object-cover pointer-events-none"/>

  const step3 = `
  <div class="space-y-5">
    <div class="flex items-start gap-2.5 rounded-xl bg-amber-50 border border-amber-200 px-4 py-3 text-xs text-amber-800">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-bold uppercase tracking-wider text-ink-500">PREÇO (ITL) *</label>

        class="w-full mt-1.5 border border-ink-200 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-brand-400 transition"

  /* ── STEP 4: Revisão ── */
  const catObj  = CATEGORIES.find(x=>x.id===v.cat);

  const rowItem = (icon,lbl,val,cls='text-ink-800') => `

      <span class="text-xs font-semibold ${cls} flex-1">${val}</span>

  const step4 = `

    <div class="rounded-2xl border border-ink-100 overflow-hidden">
      ${STATE.newServiceLogo
        ? `<img src="${STATE.newServiceLogo}" class="w-full h-36 object-cover"/>`
        : `<div class="w-full h-36 flex items-center justify-center" style="background:${catObj?.color||'#e5e7eb'}15">
            <i data-lucide="${catObj?.icon||'briefcase'}" class="w-10 h-10 opacity-20" style="color:${catObj?.color||'#9ca3af'}"></i>

      <div class="p-4">

    </div>
    <div class="rounded-2xl border border-ink-100 p-4">
      ${rowItem('map-pin','País',`${coObj?.flag||''} ${coObj?.name||'—'}`)}

      ${rowItem('clipboard-list','Briefing',nReqs?`${nReqs} campo(s)`:'—')}
      ${(STATE.newServiceGallery||[]).length ? rowItem('image','Galeria',`${STATE.newServiceGallery.length} imagem(ns)`) : ''}

    <div class="flex items-start gap-3 rounded-xl bg-amber-50 border border-amber-200 px-4 py-3">
      <div class="w-8 h-8 rounded-full bg-amber-100 grid place-items-center shrink-0">
        <i data-lucide="clock" class="w-4 h-4 text-amber-600"></i>
      </div>
      <div class="text-xs text-amber-800 leading-relaxed">
        <span class="font-bold block mb-0.5">Enviar para revisão</span>
        Após publicar, a equipe Interwork revisa em até <strong>24h</strong>. Você será notificado quando aparecer no marketplace.
      </div>
    </div>
  </div>`;

  const bodies = {1:step1,2:step2,3:step3,4:step4};

  const btnBack = step > 1
    ? `<button onclick="nsWizardNavPage(-1)" class="flex items-center gap-2 px-5 py-2.5 border border-ink-200 hover:bg-ink-50 font-semibold text-sm rounded-xl transition"><i data-lucide="chevron-left" class="w-4 h-4"></i>Voltar</button>`
    : `<button onclick="STATE.route='dashboard';STATE.dashboardTab='freelancer';renderView()" class="flex items-center gap-2 px-5 py-2.5 border border-ink-200 hover:bg-ink-50 font-semibold text-sm rounded-xl transition"><i data-lucide="x" class="w-4 h-4"></i>Cancelar</button>`;

  const btnNext = step < 4
    ? `<button onclick="nsWizardNavPage(1)" class="flex items-center gap-2 px-6 py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-bold text-sm rounded-xl transition">Próximo<i data-lucide="chevron-right" class="w-4 h-4"></i></button>`
    : `<button onclick="${STATE._nsEdit?`saveService('${STATE._nsEdit}')`:'createService()'}" class="flex items-center gap-2 px-6 py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-bold text-sm rounded-xl transition"><i data-lucide="send" class="w-4 h-4"></i>Enviar para Revisão</button>`;

  return `

    <div class="max-w-xl mx-auto px-4 py-10">

      <!-- Header: título + step bar centralizado -->
      <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 text-xs text-ink-500 mb-4">
          <button onclick="STATE.route='dashboard';STATE.dashboardTab='freelancer';renderView()" class="hover:text-brand-500 transition">Dashboard</button>
          <i data-lucide="chevron-right" class="w-3 h-3"></i>
          <span class="font-semibold text-ink-700">${editing?'Editar Serviço':'Publicar Serviço'}</span>
        </div>
        <h1 class="text-xl font-extrabold text-ink-900 mb-5">${editing?'Editar Serviço':'Registrar um Serviço'}</h1>

        <!-- Step bar horizontal centralizado -->
        <div class="flex items-center justify-center gap-0 mb-2">
          ${STEPS.map((s,i)=>{
            const done = step > s.n, active = step === s.n;
            return `
            ${i>0?`<div class="w-12 h-0.5 ${done?'bg-brand-500':'bg-ink-200'}"></div>`:''}
            <button onclick="if(${s.n}<${step+1}){STATE._nsStep=${s.n};renderView()}"
              class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm border-2 transition-all shrink-0
                ${done?'bg-brand-500 border-brand-500 text-white cursor-pointer':active?'border-brand-500 text-brand-600 bg-white':'border-ink-200 text-ink-400 bg-white cursor-default'}">
              ${done?`<i data-lucide="check" class="w-4 h-4"></i>`:s.n}
            </button>`;
          }).join('')}
        </div>
        <p class="text-xs text-ink-400">Passo ${step} de 4 — <span class="font-semibold text-ink-600">${STEPS[step-1].label}</span></p>
      </div>

      <!-- Card do form -->
      <div class="bg-white border border-ink-100 rounded-2xl overflow-hidden shadow-sm">

        <!-- Step body -->
        <div class="px-6 py-6">
          ${bodies[step] || step1}
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-ink-100 flex items-center justify-between bg-ink-50/30">
          ${btnBack}
          <button onclick="STATE.route='dashboard';STATE.dashboardTab='freelancer';renderView()"
            class="text-xs text-ink-400 hover:text-ink-600 transition hidden sm:block">Sair</button>
          ${btnNext}
        </div>
      </div>
    </div>
  </div>`;
}

function nsWizardNavPage(dir){
  const step = STATE._nsStep || 1;
  if(dir===1){
    if(step===1){
      const title = (document.getElementById('ns-title')?.value||'').trim();
      if(!title){ toast('Informe um título para o serviço.','warn'); return; }
      STATE._nsV.title = title;
      STATE._nsV.cat   = document.getElementById('ns-cat')?.value  || '';
      STATE._nsV.co    = document.getElementById('ns-co')?.value   || '';
      STATE._nsV.tags  = (document.getElementById('ns-tags')?.value||'').trim();
    }
    if(step===2){
      const desc = (document.getElementById('ns-desc')?.value||'').trim();
      if(desc.length<20){ toast('Descrição muito curta — mínimo 20 caracteres.','warn'); return; }
      STATE._nsV.desc = desc;
      collectFaqsFromBuilder();
      collectRequirementsFromBuilder();
    }
    if(step===3){
      const price = parseFloat(document.getElementById('ns-price')?.value||'0');
      const days  = parseInt(document.getElementById('ns-days')?.value||'0',10);
      if(!price||price<1){ toast('Defina um preço válido.','warn'); return; }
      if(!days||days<1){   toast('Defina um prazo válido.','warn'); return; }
      STATE._nsV.price = price;
      STATE._nsV.days  = days;
      STATE._nsV.inc   = (document.getElementById('ns-inc')?.value||'').trim();
    }
  }
  STATE._nsStep = Math.max(1, Math.min(4, step+dir));
  renderView();
  window.scrollTo({top:0, behavior:'smooth'});
}

      </div>
    </div>`;

  // ── STEP 2: Descrição & FAQ + Briefing ──

  const step2 = `

        <label class="text-xs font-bold uppercase tracking-wider text-ink-500">Descrição *</label>

        <div class="flex items-center justify-between mt-1">

function nsWizardNav(dir){
  // Save current step values before navigating (both forward AND back)
  const step = STATE._nsStep || 1;
  if(dir===1){
    // Validate current step
    if(step===1){
      const title = ($('#ns-title')?.value||'').trim();
      if(!title){ toast('Informe um título para o serviço.','warn'); return; }
      STATE._nsV.title = title;
      STATE._nsV.cat   = $('#ns-cat')?.value || '';
      STATE._nsV.co    = $('#ns-co')?.value  || '';
      STATE._nsV.tags  = ($('#ns-tags')?.value||'').trim();
    }
    if(step===2){
      const desc  = ($('#ns-desc')?.value||'').trim();
      if(desc.length < 20){ toast('Descrição muito curta (mínimo 20 caracteres).','warn'); return; }
      STATE._nsV.desc = desc;
      collectFaqsFromBuilder();
      collectRequirementsFromBuilder();
      const validReqs = STATE.newServiceRequirements.filter(r=>r.label && r.label.trim());
      if(!validReqs.length){ toast('Adicione pelo menos uma pergunta no formulário para o cliente.','warn'); return; }
    }
    if(step===3){
      const price = parseFloat($('#ns-price')?.value||'0');
      const days  = parseInt($('#ns-days')?.value||'0',10);
      if(!price||price<1){ toast('Defina um preço válido.','warn'); return; }
      if(!days||days<1){   toast('Defina um prazo válido.','warn'); return; }
      STATE._nsV.price = price;
      STATE._nsV.days  = days;
      STATE._nsV.inc   = ($('#ns-inc')?.value||'').trim();
    }
  } else {
    // Navigating back: save whatever is on screen too, without blocking validation
    if(step===1){
      STATE._nsV.title = ($('#ns-title')?.value||'').trim();
      STATE._nsV.cat   = $('#ns-cat')?.value || STATE._nsV.cat || '';
      STATE._nsV.co    = $('#ns-co')?.value  || STATE._nsV.co  || '';
      STATE._nsV.tags  = ($('#ns-tags')?.value||'').trim();
    }
    if(step===2){
      STATE._nsV.desc = ($('#ns-desc')?.value||'').trim();
      collectFaqsFromBuilder();
      collectRequirementsFromBuilder();
    }
    if(step===3){
      const price = parseFloat($('#ns-price')?.value||'0');
      const days  = parseInt($('#ns-days')?.value||'0',10);
      if(price)  STATE._nsV.price = price;
      if(days)   STATE._nsV.days  = days;
      STATE._nsV.inc = ($('#ns-inc')?.value||'').trim();
    }
  }
  STATE._nsStep = Math.max(1, Math.min(4, step + dir));
  renderNewServiceWizard();
}

function openEditServiceModal(id){ openNewServiceModal(id); }
function handleLogoUpload(e){
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')){ toast('Arquivo inválido. Use PNG, JPG ou SVG.','warn'); return; }
  if (file.size > 2*1024*1024){ toast('Imagem muito grande (máx 2MB).','warn'); return; }
  const reader = new FileReader();
  reader.onload = function(ev){
    STATE.newServiceLogo = ev.target.result;
    const prev = document.getElementById('ns-logo-preview');
    if (prev) prev.innerHTML = `<img src="${ev.target.result}" alt="logo" class="w-full h-full object-cover"/>`;
    const clearBtn = document.getElementById('ns-logo-clear');
    if (clearBtn) clearBtn.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}
function clearLogo(){
  STATE.newServiceLogo = null;

/* ---------- Gallery upload (Fiverr-style multiple examples) ---------- */
function handleGalleryUpload(e){
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const MAX = 8;
  const remaining = MAX - STATE.newServiceGallery.length;
  if (remaining <= 0){ toast(`Limite de ${MAX} imagens atingido.`,'warn'); e.target.value=''; return; }
  files.slice(0, remaining).forEach(file => {
    if (!file.type.startsWith('image/')){ toast('Arquivo inválido: '+file.name,'warn'); return; }
    if (file.size > 2*1024*1024){ toast(`${file.name}: máx 2MB`,'warn'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      STATE.newServiceGallery.push(ev.target.result);
      renderGalleryPreview();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function removeGalleryImg(idx){
  STATE.newServiceGallery.splice(idx, 1);
  renderGalleryPreview();
}

/* ---------- Service-detail gallery management (seller adds example photos like Fiverr) ---------- */
function isServiceOwner(s){
  if (!s) return false;
  // In this demo, the dashboard view pretends the user is 'u_ana' (see line ~1588),
  // so we treat services owned by u_ana OR by the actual current user as "yours".
  return s.freelancerId === STATE.currentUserId || s.freelancerId === 'u_ana';
}
function handleServiceGalleryUpload(e, serviceId){
  const s = getService(serviceId);
  if (!s){ e.target.value=''; return; }
  if (!isServiceOwner(s)){ toast('Apenas o dono do serviço pode adicionar fotos.', 'warn'); e.target.value=''; return; }
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const MAX = 8;
  s.gallery = s.gallery || [];
  const remaining = MAX - s.gallery.length;
  if (remaining <= 0){ toast(`Limite de ${MAX} fotos atingido.`, 'warn'); e.target.value=''; return; }
  let queued = 0, processed = 0;
  const batch = files.slice(0, remaining).filter(file => {
    if (!file.type.startsWith('image/')){ toast('Arquivo inválido: '+file.name,'warn'); return false; }
    if (file.size > 2*1024*1024){ toast(`${file.name}: máx 2MB`,'warn'); return false; }
    return true;
  });
  if (!batch.length){ e.target.value=''; return; }
  batch.forEach(file => {
    queued++;
    const reader = new FileReader();
    reader.onload = ev => {
      s.gallery.push(ev.target.result);
      processed++;
      if (processed === queued){
        toast(`${processed} foto${processed>1?'s':''} adicionada${processed>1?'s':''}.`, 'success');
        render(); // re-render the service page to show the new thumbs
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function removeServiceGalleryImg(serviceId, galleryIdx){
  const s = getService(serviceId);
  if (!s || !s.gallery) return;
  if (!isServiceOwner(s)){ toast('Apenas o dono pode remover fotos.', 'warn'); return; }
  if (!confirm('Remover esta foto de exemplo?')) return;
  s.gallery.splice(galleryIdx, 1);
  toast('Foto removida.', 'success');
  render();
}

/* ---------- Gallery drag-and-drop reordering (owner only) ---------- */
let _galleryDrag = { sid:null, fromIdx:null };
function galleryDragStart(e, sid, idx){
  _galleryDrag = { sid, fromIdx: idx };
  e.dataTransfer.effectAllowed = 'move';
  // Required for Firefox to fire drag events
  try { e.dataTransfer.setData('text/plain', String(idx)); } catch(_){}
  e.currentTarget.classList.add('dragging');
}
function galleryDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
function galleryDragEnter(e){
  const el = e.currentTarget;
  if (el && !el.classList.contains('dragging')) el.classList.add('drag-over');
}
function galleryDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function galleryDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.gig-thumb-drag.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function galleryDrop(e, sid, toIdx){
  e.preventDefault();
  e.stopPropagation();
  const fromIdx = _galleryDrag.fromIdx;
  _galleryDrag = { sid:null, fromIdx:null };
  document.querySelectorAll('.gig-thumb-drag.drag-over,.gig-thumb-drag.dragging').forEach(el => el.classList.remove('drag-over','dragging'));
  if (fromIdx === null || fromIdx === toIdx) return;
  const s = getService(sid);
  if (!s || !isServiceOwner(s)) return;
  // Build flat array [thumb, ...gallery], reorder, then split back
  const flat = [s.thumb, ...(s.gallery || [])];
  const [moved] = flat.splice(fromIdx, 1);
  flat.splice(toIdx, 0, moved);
  s.thumb = flat[0];
  s.gallery = flat.slice(1);
  toast('Ordem atualizada.', 'success');
  render();
}
function renderGalleryPreview(){
  const grid = document.getElementById('ns-gallery-grid');
  if (!grid) return;
  grid.innerHTML = STATE.newServiceGallery.map((src, i) => `
    <div class="relative group rounded-xl overflow-hidden border border-ink-100" style="aspect-ratio:1/1">
      <img src="${src}" class="w-full h-full object-cover"/>
      <button type="button" onclick="removeGalleryImg(${i})" class="absolute top-1 right-1 w-6 h-6 grid place-items-center rounded-full bg-rose-500 hover:bg-rose-600 text-white opacity-0 group-hover:opacity-100 transition shadow">
        <i data-lucide="x" class="w-3 h-3"></i>
      </button>
      <div class="absolute bottom-1 left-1 px-1.5 py-0.5 rounded bg-black/60 text-white text-[10px] font-bold">${i+1}</div>

function saveService(id){
  const s = getService(id);
  if (!s){ toast('Serviço não encontrado.', 'warn'); return; }
  if (!isServiceOwner(s)){ toast('Você não pode editar este serviço.', 'warn'); return; }
  const v = STATE._nsV || {};
  const title = (v.title||'').trim();
  const cat   = v.cat || s.category;
  const co    = v.co  || s.country;
  const price = +(v.price||s.price||0);
  const days  = +(v.days||s.deliveryDays||7);
  const desc  = (v.desc||'').trim();
  const inc   = (v.inc||'').split(',').map(x=>x.trim()).filter(Boolean);
  const tags  = (v.tags||'').split(',').map(x=>x.trim().toLowerCase()).filter(Boolean).slice(0,10);
  if (!title || !desc || !price){ toast('Preencha título, descrição e preço.', 'warn'); return; }
  s.title         = title;
  s.category      = cat;
  s.country       = co;
  s.price         = price;
  s.deliveryDays  = days;
  s.description   = desc;
  s.includes      = inc.length ? inc : ['Pacote padrão'];
  s.tags          = tags;
  s.requirements  = collectRequirementsFromBuilder();
  s.faqs          = collectFaqsFromBuilder();

  STATE._nsV = null;

  closeModal();

function deleteService(id){
  const s = getService(id);
  if (!s){ return; }
  if (!isServiceOwner(s)){ toast('Você não pode excluir este serviço.', 'warn'); return; }
  // Block deletion if there are open orders for this service
  const openOrders = STATE.orders.filter(o => o.serviceId === id && o.status !== 'approved' && o.status !== 'cancelled');
  if (openOrders.length){
    toast(`Não é possível excluir: existem ${openOrders.length} pedido(s) em andamento.`, 'warn');
    return;
  }
  if (!confirm(`Excluir o serviço "${s.title}"?\n\nEssa ação não pode ser desfeita.`)) return;
  const idx = DB.services.findIndex(x => x.id === id);
  if (idx >= 0) DB.services.splice(idx, 1);
  closeModal();
  toast('Serviço excluído.', 'success');
  // If user was on this service page, redirect to dashboard freelancer
  if (STATE.route === 'service' && STATE.selectedServiceId === id){
    go('#/dashboard/freelancer');
  } else {
    render();
  }
}

function updateRequirementField(reqId, key, value){
  const r = STATE.newServiceRequirements.find(x=>x.id===reqId);
  if (!r) return;
  if (key==='required'){ r[key] = !!value; }
  else if (key==='options'){ r[key] = (value||'').split(',').map(x=>x.trim()).filter(Boolean); }
  else { r[key] = value; }
}

function collectRequirementsFromBuilder(){
  // Lê valores atuais dos inputs antes de persistir

    const lab = document.getElementById('req-lbl-'+r.id);

    const req = document.getElementById('req-req-'+r.id);
    const opt = document.getElementById('req-opt-'+r.id);
    if (lab) r.label = lab.value.trim();
    if (typ) r.type = typ.value;
    if (req) r.required = req.checked;
    if (opt) r.options = opt.value.split(',').map(x=>x.trim()).filter(Boolean);

  return STATE.newServiceRequirements
    .filter(r => r.label && r.label.length)
    .map(r => ({ id:r.id, type:r.type, label:r.label, required:!!r.required, options:r.options||[], placeholder:r.placeholder||'' }));
}

function renderRequirementInput(r, i){
  const id = 'reqf-'+r.id;
  const labelHtml = `<label class="text-sm font-bold flex items-center gap-1.5">
    <span class="w-5 h-5 rounded-full bg-amber-100 text-amber-700 text-[10px] grid place-items-center font-extrabold">${i+1}</span>

    ${r.required ? '<span class="text-rose-500">*</span>' : '<span class="text-[10px] text-ink-500 font-normal">(opcional)</span>'}
  </label>`;
  const ph = escapeHtml(r.placeholder || '');
  if (r.type==='textarea'){
    return `<div>${labelHtml}<textarea id="${id}" rows="4" class="w-full border border-ink-100 rounded-xl px-3 py-2 mt-1 text-sm" placeholder="${ph}"></textarea></div>`;
  }
  if (r.type==='url'){
    return `<div>${labelHtml}<input id="${id}" type="url" class="w-full border border-ink-100 rounded-xl px-3 py-2 mt-1 text-sm" placeholder="${ph||'https://...'}"/></div>`;
  }
  if (r.type==='select'){
    return `<div>${labelHtml}<select id="${id}" class="w-full border border-ink-100 rounded-xl px-3 py-2 mt-1 text-sm">
      <option value="">— Selecione —</option>
      ${(r.options||[]).map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}
    </select></div>`;
  }
  if (r.type==='file'){
    return `<div>${labelHtml}<input id="${id}" type="file" class="w-full text-xs mt-1"/></div>`;
  }
  return `<div>${labelHtml}<input id="${id}" type="text" class="w-full border border-ink-100 rounded-xl px-3 py-2 mt-1 text-sm" placeholder="${ph}"/></div>`;
}

function submitRequirements(orderId){
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o) return;
  const s = getService(o.serviceId);
  const reqs = (s.requirements || []);
  const answers = {};
  let missing = null;
  for (const r of reqs){
    const el = document.getElementById('reqf-'+r.id);
    if (!el) continue;
    let val = '';
    if (r.type==='file'){
      val = el.files && el.files[0] ? el.files[0].name : '';
    } else {
      val = (el.value || '').trim();
    }
    if (r.required && !val){ missing = r.label; break; }
    answers[r.id] = val;
  }
  if (missing){
    toast('Preencha o campo obrigatório: '+missing, 'warn');
    return;
  }
  o.requirementsAnswers = answers;
  o.requirementsSubmitted = true;
  o.requirementsSubmittedTs = Date.now();
  o.status = 'in_progress';
  // Reseta o prazo de entrega: começa AGORA, garantia justa pro freelancer
  o.deliveryAt = Date.now() + (o.deliveryDays || s.deliveryDays || 7)*86400000;
  o.progress = Math.max(o.progress||0, 10);
  // Mensagem automática no chat com resumo do briefing
  const summary = Object.entries(answers).slice(0,3).map(([fid,val])=>{
    const f = reqs.find(r=>r.id===fid);
    return `• ${f?f.label:fid}: ${String(val).slice(0,80)}`;
  }).join('\n');
  STATE.messages[o.id] = STATE.messages[o.id] || [];
  STATE.messages[o.id].push({
    from: o.clientId,
    text: '📋 Formulário enviado:\n'+summary+(Object.keys(answers).length>3?'\n…':''),
    ts: nowTs()
  });
  addNotification({
    type:'message',
    title:'Formulário recebido',
    body:`Cliente enviou o formulário do pedido #${o.id.slice(-5)} — prazo iniciado.`,
    link:'#/dashboard/freelancer'
  });
  closeModal();
  toast('Formulário enviado on-chain. Prazo iniciado.', 'success');
  render();
  // ATV modal: espera render() terminar, então exibe após 800ms
  setTimeout(showAtvRewardsOffer, 800);
}

/* ============ ONBOARDING CHECKLIST (Upwork-style, mas funcional) ============ */
function onboardingItems(){
  const u = getUser(STATE.currentUserId) || getUser('u_ana');
  const mySvc = DB.services.filter(sv=>sv.freelancerId===u.id);
  const myOrders = STATE.orders.filter(o=>o.freelancerId===u.id);
  return [
    { label:'Conectar carteira',         done: !!STATE.walletConnected,                                           cta:{ label:'Conectar', onclick:"toast('Carteira já conectada','info')" } },
    { label:'Completar seu perfil',      done: !!(u.bio&&u.bio.length>20&&(u.skills||[]).length>=1),              cta:{ label:'Editar perfil', onclick:`go('#/u/${u.handle}')` } },
    { label:'Publicar um serviço',       done: mySvc.length >= 1,                                                 cta:{ label:'Criar serviço', onclick:'openNewServiceModal()' } },
    { label:'Receber primeiro pedido',   done: myOrders.some(o=>o.status==='approved'),                           cta:{ label:'Ver pedidos', onclick:"go('#/dashboard/freelancer')" } },
  ];
}

function renderOnboardingChecklist(){
  if (STATE.onboardingDismissed) return '';
  const items = onboardingItems();
  const done = items.filter(i=>i.done).length;
  if (done === items.length){ STATE.onboardingDismissed=true; return ''; }
  const pct = Math.round((done/items.length)*100);
  const expanded = STATE._onboardingExpanded;
  return `
  <div class="bg-white border border-ink-100 rounded-2xl shadow-card overflow-hidden mb-5">
    <button onclick="STATE._onboardingExpanded=!STATE._onboardingExpanded;renderView()"
      class="w-full flex items-center gap-3 px-4 py-3 hover:bg-ink-50/50 transition text-left">
      <i data-lucide="rocket" class="w-4 h-4 text-brand-500 shrink-0"></i>
      <span class="font-semibold text-sm flex-1">Primeiros passos — ${done} de ${items.length} concluídos</span>
      <div class="w-24 bg-ink-100 rounded-full h-1.5 shrink-0">
        <div class="bg-brand-500 h-1.5 rounded-full transition-all" style="width:${pct}%"></div>
      </div>
      <span class="text-xs text-ink-400 font-semibold w-7 text-right">${pct}%</span>
      <i data-lucide="${expanded?'chevron-up':'chevron-down'}" class="w-4 h-4 text-ink-400 shrink-0"></i>
      <button onclick="event.stopPropagation();STATE.onboardingDismissed=true;renderView()" class="text-ink-300 hover:text-ink-500 ml-1 p-0.5">
        <i data-lucide="x" class="w-3.5 h-3.5"></i>
      </button>
    </button>
    ${expanded ? `
    <div class="border-t border-ink-100 px-4 py-3 grid sm:grid-cols-2 gap-2">
      ${items.map(it=>`
        <div class="flex items-center gap-3 p-2.5 rounded-xl ${it.done?'opacity-50':''}">
          <i data-lucide="${it.done?'check-circle-2':'circle'}" class="w-4 h-4 shrink-0 ${it.done?'text-emerald-500':'text-ink-200'}"></i>
          <span class="text-sm ${it.done?'line-through text-ink-400':'text-ink-700 font-medium'}">${it.label}</span>
          ${!it.done?`<button onclick="${it.cta.onclick}" class="ml-auto text-xs font-bold text-brand-500 hover:text-brand-600 shrink-0">${it.cta.label} →</button>`:''}
        </div>`).join('')}
    </div>` : ''}
  </div>`;
}

/* ---------- DISPUTE SYSTEM (F2) ---------- */
function pickArbiters(excludeIds=[]){
  // pick 3 random verified users not involved
  const pool = DB.users.filter(u=>u.verified && !excludeIds.includes(u.id) && u.id!=='u_me');
  const arr = [...pool].sort(()=>Math.random()-0.5).slice(0,3);

}

function confirmDispute(orderId, perspective){
  const o = STATE.orders.find(x=>x.id===orderId);
  const reason = $('#disp-reason').value;
  const desc = $('#disp-desc').value.trim();
  const want = (document.querySelector('input[name="disp-want"]:checked')||{value:'refund'}).value;
  if (!desc || desc.length<20){ toast('Descreva os fatos com pelo menos 20 caracteres.', 'warn'); return; }

  const hash = txHash();
  o.dispute = {
    openedBy: perspective==='client' ? o.clientId : o.freelancerId,
    openedTs: Date.now(),
    reason, desc, want,
    bondITL: 5,
    txHash: hash,
    status: 'pending',
    arbiters: pickArbiters([o.clientId, o.freelancerId]),
    votes: { refund:0, split:0, release:0 },
    resolution: null,
  };
  o.status = 'disputed';
  STATE.txHistory.unshift({ hash, type:'dispute_open', amount:5, token:'ITL', ts:Date.now(), orderId:o.id });
  addNotification({ type:'dispute', title:'Disputa aberta', body:`Pedido #${o.id.slice(-5)} entrou em disputa.`, link:'#/dashboard/'+perspective });
  closeModal();
  toast('Disputa registrada on-chain. 3 árbitros sorteados.', 'info');
  openDisputeView(orderId);

  // ADICIONADO — tenta salvar a disputa de verdade no Supabase. Se não houver sessão real
  // ou o pedido não tiver UUID real (order.sbId), segue 100% local como já funcionava.
  sbCreateDispute(o, o.dispute).then(({ data, error }) => {
    if (data) {
      o.disputeSbId = data.id;
      console.log('✅ Disputa salva no Supabase:', data.id);
      sbSubscribeDispute(o);
    } else if (error) {
      console.warn('[Supabase] Disputa não salva no banco (seguindo apenas local):', error.message);
    }
  });

  // simulate voting over a few seconds
  setTimeout(()=>simulateVote(orderId, 0), 1500);
  setTimeout(()=>simulateVote(orderId, 1), 3200);
  setTimeout(()=>simulateVote(orderId, 2), 4800);
}

function simulateVote(orderId, idx){
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o || !o.dispute || o.dispute.status!=='pending') return;
  // bias toward what the opener asked, but with noise
  const opts = ['refund','split','release'];
  const weights = o.dispute.want==='refund' ? [0.55,0.25,0.20] : [0.25,0.50,0.25];
  let r = Math.random(), acc=0, choice='refund';
  for (let i=0;i<3;i++){ acc+=weights[i]; if (r<=acc){ choice=opts[i]; break; } }
  o.dispute.arbiters[idx].vote = choice;
  o.dispute.votes[choice]++;

  // if 3 votes cast → resolve
  if (o.dispute.arbiters.every(a=>a.vote)) resolveDispute(orderId);
  if ($('#dispute-modal')) renderDisputeView(o);

  // ADICIONADO — sincroniza o voto simulado com o Supabase, se a disputa tiver UUID real.
  if (o.disputeSbId) sbUpdateDispute(o, o.dispute);
}

function resolveDispute(orderId){
  const o = STATE.orders.find(x=>x.id===orderId);
  const v = o.dispute.votes;
  let winner = 'refund';
  if (v.split >= v.refund && v.split >= v.release) winner='split';
  if (v.release >  v.refund && v.release >  v.split)  winner='release';
  const hash = txHash();
  o.dispute.status = 'resolved';
  o.dispute.resolution = { winner, txHash: hash, ts: Date.now() };
  STATE.txHistory.unshift({ hash, type:'dispute_resolve', amount:o.total, token:'ITL', ts:Date.now(), orderId:o.id });
  const me = getUser(STATE.currentUserId);
  if (winner==='refund'){ me.balanceITL += o.total; o.status='approved'; o.progress=100; }
  else if (winner==='split'){ me.balanceITL += o.total/2; o.status='approved'; o.progress=100; }
  else { o.status='approved'; o.progress=100; } // release → freelancer
  addNotification({ type:'dispute', title:'Disputa resolvida', body:`Resultado: ${winner==='refund'?'reembolso total':winner==='split'?'divisão 50/50':'liberação ao freelancer'}.`, link:'#/dashboard/client' });
  if ($('#dispute-modal')) renderDisputeView(o);
}

function openDisputeView(orderId){
  const o = STATE.orders.find(x=>x.id===orderId);
  if (!o || !o.dispute) return;
  if (o.disputeSbId) sbSubscribeDispute(o); // ADICIONADO — escuta votos/resolução em tempo real
  renderDisputeView(o);
}

let _searchIdx = -1;

function getSearchSuggestions(val){
  const q = val.trim().toLowerCase();
  if (!q) {
    // vazio/focado: mostra buscas recentes (se houver) + populares
    const popular = ['discord','design','solidity','audit','marketing','whitepaper','landing','motion reels','community','tokenomics'];
    const recent = (STATE.recentSearches || []).slice(0, 5);
    return { type:'popular', items: popular, recent };
  }
  // Match service titles
  const matches = DB.services
    .filter(s => (!s.status||s.status==='approved') && s.title.toLowerCase().includes(q))
    .slice(0, 5)
    .map(s => ({ label: s.title, id: s.id, price: s.price, thumb: s.thumb }));
  // Also match category names
  const catMatches = CATEGORIES
    .filter(c => c.label.toLowerCase().includes(q) || c.id.toLowerCase().includes(q))
    .slice(0, 3)
    .map(c => ({ label: c.label, catId: c.id }));
  // Also match freelancers by name or handle
  const sellerMatches = DB.users
    .filter(u => u.id !== STATE.currentUserId &&
      ((u.name||'').toLowerCase().includes(q) || (u.handle||'').toLowerCase().includes(q)))
    .slice(0, 3)
    .map(u => ({ label: u.name, handle: u.handle, avatar: u.avatar }));
  return { type:'results', matches, catMatches, sellerMatches };
}

function saveRecentSearch(val){
  const v = (val||'').trim();
  if (!v) return;
  STATE.recentSearches = STATE.recentSearches || [];
  STATE.recentSearches = [v, ...STATE.recentSearches.filter(s => s.toLowerCase() !== v.toLowerCase())].slice(0, 6);
  schedulePersist();
}

function handleSearchKey(e){
  const dd = $('#search-dropdown');
  if (!dd || dd.classList.contains('hidden')) {
    if (e.key === 'Enter') { e.preventDefault(); commitSearch(($('#q')||$('#q-mob')||e.target)?.value?.trim()||''); }
    return;
  }
  const opts = Array.from(dd.querySelectorAll('.search-opt'));
  if (e.key === 'ArrowDown'){ e.preventDefault(); _searchIdx = Math.min(_searchIdx+1, opts.length-1); highlightOpt(opts); }
  else if (e.key === 'ArrowUp'){ e.preventDefault(); _searchIdx = Math.max(_searchIdx-1, -1); highlightOpt(opts); }
  else if (e.key === 'Enter'){
    e.preventDefault();
    if (_searchIdx >= 0 && opts[_searchIdx]) opts[_searchIdx].dispatchEvent(new MouseEvent('mousedown'));
    else commitSearch($('#q').value.trim());
  }
  else if (e.key === 'Escape') closeSearchDropdown();
}

function highlightOpt(opts){
  opts.forEach((o,i) => {
    o.classList.toggle('bg-ink-100/60', i === _searchIdx);
    if (i === _searchIdx) { o.scrollIntoView({block:'nearest'}); $('#q').value = o.textContent.trim() || $('#q').value; }
  });
}

function pickSuggestion(val){
  const q = $('#q'); if (q) q.value = val;

  if (!val) return;

/* ---------- ATV (Average Transaction Value) — ajuda a preencher o formulário oficial ----------

// ADICIONADO — centraliza a decisão do usuário sobre o ATV, em vez de só remover o overlay.
// choice: 'yes' abre o formulário de envio; 'no' apenas fecha registrando a escolha.
function dismissATVChoice(orderId, choice){
  const el = document.getElementById('atv-choice-overlay');
  if (el) el.remove();
  if (choice === 'yes') {
    openATVSubmitModal(orderId);
  }
  // Guarda a decisão no pedido local, para não insistir de novo no mesmo pedido.
  const o = STATE.orders.find(x => x.id === orderId);
  if (o) o.atvChoice = choice;
}

function openATVBanner(orderId){ showATVChoice(orderId); } // alias de compatibilidade

function openATVSubmitModal(orderId){
  const o = STATE.orders.find(x=>x.id===orderId);

  const s = getService(o.serviceId);
  const client = getUser(o.clientId);
  const country = COUNTRIES.find(c=>c.id===client?.country);
  const releaseTx = o.releaseTx || o.escrowTx || '';
  const productLabel = s ? s.title : 'Serviço Interwork';
  const proofText = `Serviço entregue e aprovado via Interwork (Interlink). Pedido #${o.id.slice(-8).toUpperCase()}, ${fmtITL(o.total||o.price)} pagos em ITL, tx de liberação ${releaseTx}.`;

          <div>
            <div class="font-extrabold text-base">Enviar para o ATV</div>

            <div class="flex gap-2">
              <input id="${f.id}" readonly value="${escapeHtml(f.value)}" class="flex-1 border border-ink-200 rounded-xl px-3 py-2 text-sm bg-ink-100/30 font-mono"/>

function copyATVField(id){
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.value).then(()=>toast('Copiado!', 'success')).catch(()=>toast('Não foi possível copiar.', 'error'));
}
function copyAllATVFields(){
  const ids = ['atv-linker','atv-hash','atv-product','atv-itl','atv-country','atv-proof'];
  const labels = ['Linker ID','Transaction Hash','Product or Service','ITL Amount Used','Country / Region','Proof of Transaction'];
  const text = ids.map((id,i)=>`${labels[i]}: ${document.getElementById(id)?.value||''}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>toast('Todos os campos copiados!', 'success')).catch(()=>toast('Não foi possível copiar.', 'error'));
}
