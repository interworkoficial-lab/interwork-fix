<script>
(function initReown() {
  const MAX = 50, DELAY = 100;
  let tries = 0;
  function tryInit() {
    tries++;
    const createAppKit = window.__ReownCreateAppKit;
    const EthersAdapter = window.__ReownEthersAdapter;
    const nets = window.__ReownNetworks;
    if (!createAppKit || !EthersAdapter || !nets) {
      if (tries < MAX) setTimeout(tryInit, DELAY);
      return;
    }
    try {
      const modal = createAppKit({
        adapters: [new EthersAdapter()],
        networks: [nets.bsc, nets.mainnet, nets.polygon],
        defaultNetwork: nets.bsc,
        projectId: '2ee67a36114285f54c77e2f785e69462',
        metadata: {
          name: 'Interwork',
          description: 'The workforce marketplace for the Interlink ecosystem',
          url: 'https://interwork.online',
          icons: ['https://interwork.online/favicon.png'],
        },
        themeMode: 'dark',
        features: { analytics: false, email: false, socials: false },
      });
      window._reownModal = modal;
      modal.subscribeAccount(function(account) {
        if (account && account.isConnected && account.address) {
          if (typeof window._handleReownConnected === 'function')
            window._handleReownConnected(account.address);
        } else {
          if (typeof window._handleReownDisconnected === 'function')
            window._handleReownDisconnected();
        }
      });
    } catch(e) {
      console.error('[Reown] Erro ao inicializar AppKit:', e);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInit);
  } else {
    tryInit();
  }
})();
</script>

window._handleReownConnected = async function(address) {
  try {
    if (typeof sb !== 'undefined' && sb) {
      let { data: sessionData } = await sb.auth.getSession();
      if (!sessionData.session) {
        const { error: signInError } = await sb.auth.signInAnonymously({
          options: { data: { wallet: address, name: 'Usuário', role: 'client' } }
        });
        if (signInError) console.warn('[Supabase] Erro no login anônimo:', signInError.message);
      }
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        await sb.from('profiles').update({ wallet_address: address }).eq('id', user.id);
        STATE.sbProfile = await sbLoadProfile(user.id);
      }
    }
  } catch (e) {
    console.warn('[Supabase] Falha ao sincronizar sessão da wallet:', e);
  }
  const me = getUser(STATE.currentUserId) || DB.users[0];
  if (!STATE.onboardingComplete) {
    me.name = 'Usuário';
    me.handle = address.slice(0,6) + '.interlink';
    me.wallet = address;
    me.avatar = avatarSVG('U', '#1a73e8');
    me.bio = 'Cliente Web3 explorando serviços na Interwork.';
    me.verified = true;
    me.online = true;
    STATE.userRole = 'client';
    STATE.onboardingComplete = true;
    STATE.dashboardTab = 'client';
  } else {
    me.wallet = address;
  }
  STATE.walletProvider = 'WalletConnect';
  STATE.walletConnected = true;
  STATE.authenticated = true;
  closeModal();
  persistNow();
  renderHeader();
  renderView();
  toast('Wallet conectada!', 'success');
};

/* ---------- AUTO-APPROVE ---------- */
const AUTO_APPROVE_DAYS = 3;
const AUTO_APPROVE_MS = AUTO_APPROVE_DAYS * 24 * 60 * 60 * 1000;

function runAutoApprove(){
  let changed = false;
  STATE.orders.forEach(o => {
    if (o.status !== 'delivered') return;
    const dl = o.deliveredAt + AUTO_APPROVE_MS;
    if (o.dispute || Date.now() < dl) return;
    const hash = txHash();
    o.releaseTx = hash;
    o.status = 'approved';
    o.progress = 100;
    o.approvedAt = Date.now();
    o.autoApproved = true;
    const fl = getUser(o.freelancerId);
    if (fl){ fl.balanceITL = +((fl.balanceITL || 0) + (o.price || 0)).toFixed(2); fl.jobs = (fl.jobs || 0) + 1; }
    STATE.txHistory.unshift({ hash, type:'escrow_release', amount: o.price, token:'ITL', ts: Date.now(), orderId: o.id, autoApproved: true });
    addNotification({ type: 'tx', title: '⏰ Aprovação automática', body: `Pedido aprovado automaticamente após ${AUTO_APPROVE_DAYS} dias.`, link: '#/dashboard/client' });
    STATE.messages[o.id] = STATE.messages[o.id] || [];
    STATE.messages[o.id].push({ from: o.clientId, text: `⏰ Aprovação automática após ${AUTO_APPROVE_DAYS} dias.`, ts: nowTs() });
    changed = true;
  });
  if (changed){ persistNow(); if (['dashboard','wallet'].includes(STATE.route)) renderView(); }
}

/* ---------- PERSISTÊNCIA ---------- */
const STORAGE_KEY = 'interwork_demo_v1';
const PERSIST_STATE_KEYS = [
  'currentUserId','query','category','country','sort','ratingMin','priceMax','verifiedOnly','availableOnly',
  'selectedServiceId','orders','messages','chatOpenOrderId','dashboardTab','clientOrdersTab','walletConnected',
  'authenticated','onboardingComplete','userRole','walletProvider','network','recentlyViewed','favorites','notifications','txHistory','payouts','selectedProfileHandle',
  'language','translateChat','selectedTier','selectedAddons','selectedToken','showQR','darkMode','onboardingDismissed',
];

let PERSIST = { ready:false, timer:null, lastJson:'', quotaWarned:false };

function canUseLocalStorage(){
  try { localStorage.setItem(STORAGE_KEY+':test','1'); localStorage.removeItem(STORAGE_KEY+':test'); return true; } catch(_){ return false; }
}

function stateSnapshot(){
  return PERSIST_STATE_KEYS.reduce((out, key) => { out[key] = STATE[key]; return out; }, {});
}

function persistNow(){
  if (!PERSIST.ready || !canUseLocalStorage()) return;
  try {
    const json = JSON.stringify({
      version: 1, savedAt: Date.now(),
      state: stateSnapshot(),
      db: { users: DB.users, services: DB.services, reviews: DB.reviews }
    });
    if (json === PERSIST.lastJson) return;
    localStorage.setItem(STORAGE_KEY, json);
    PERSIST.lastJson = json;
  } catch (err) {
    if (!PERSIST.quotaWarned) { PERSIST.quotaWarned = true; toast('Não foi possível salvar tudo no localStorage.', 'warn'); }
    console.warn('Interwork persistence failed:', err);
  }
}

function schedulePersist(){
  if (!PERSIST.ready) return;
  clearTimeout(PERSIST.timer);
  PERSIST.timer = setTimeout(persistNow, 120);
}

function restorePersistedData(){
  if (!canUseLocalStorage()) return false;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (!snap || snap.version !== 1) return false;
    if (snap.db && Array.isArray(snap.db.users) && Array.isArray(snap.db.services)) {
      DB.users = snap.db.users;
      DB.services = snap.db.services;
      DB.reviews = Array.isArray(snap.db.reviews) ? snap.db.reviews : [];
    }
    if (snap.state && typeof snap.state === 'object') {
      PERSIST_STATE_KEYS.forEach(key => {
        if (Object.prototype.hasOwnProperty.call(snap.state, key)) STATE[key] = snap.state[key];
      });
    }
    if (!getUser(STATE.currentUserId)) STATE.currentUserId = 'u_me';
    if (!Array.isArray(STATE.orders)) STATE.orders = [];
    if (!Array.isArray(STATE.favorites)) STATE.favorites = [];
    if (!STATE.messages || typeof STATE.messages !== 'object') STATE.messages = {};
    if (!Array.isArray(STATE.notifications)) STATE.notifications = [];
    if (!Array.isArray(STATE.txHistory)) STATE.txHistory = [];
    if (!Array.isArray(STATE.payouts)) STATE.payouts = [];
    STATE.restoredFromStorage = true;
    PERSIST.lastJson = raw;
    return true;
  } catch (err) {
    console.warn('Interwork restore failed:', err);
    return false;
  }
}

function startPersistence(){
  PERSIST.ready = true;
  window.addEventListener('beforeunload', persistNow);
  setInterval(persistNow, 1500);
}

async function sbInitAuth() {
  if (!sb) return;
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    STATE.sbUser = session.user;
    STATE.isAdmin = session.user.email === 'interworkoficial@gmail.com';
    STATE.sbProfile = await sbLoadProfile(session.user.id);
  }
  STATE.sbReady = true;
}

async function sbSignOut() {
  if (!sb) return;
  await sb.auth.signOut();
  STATE.sbUser = null;
  STATE.isAdmin = false;
  STATE.sbProfile = null;
  renderView();
}

function sbSubscribeServices() {
  if (!sb) return;
  sb.channel('services-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'services' }, payload => {
      const changed = payload.new || payload.old;
      if (!changed) return;
      const idx = DB.services.findIndex(s => s.id === changed.id);
      if (payload.eventType === 'DELETE') {
        if (idx >= 0) DB.services.splice(idx, 1);
      } else {
        const local = sbSvcToLocal(changed);
        if (idx >= 0) DB.services[idx] = local;
        else DB.services.unshift(local);
      }
      renderView();
    })
    .subscribe();
}

const PAGE_SIZE = 24;

function paginationBar(totalItems) {
  const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));
  if (totalPages <= 1) return '';
  const cur = Math.min(Math.max(1, STATE.page||1), totalPages);
  let pages = [];
  if (totalPages <= 10) {
    pages = Array.from({length:totalPages}, (_,i)=>i+1);
  } else {
    pages = [1];
    if (cur > 3) pages.push('...');
    for(let i=Math.max(2, cur-2); i<=Math.min(totalPages-1, cur+2); i++) pages.push(i);
    if (cur < totalPages-2) pages.push('...');
    pages.push(totalPages);
  }
  return `
  <nav class="flex items-center justify-center gap-2 mt-8">
    <button onclick="goToPage(${cur-1})" ${cur===1?'disabled':''} class="w-9 h-9 grid place-items-center rounded-full border border-slate-200 hover:bg-slate-100 disabled:opacity-30"><i class="ri-arrow-left-s-line"></i></button>
    ${pages.map(p => p==='...' ? `<span class="w-9 h-9 grid place-items-center text-sm text-slate-400">…</span>` : `<button onclick="goToPage(${p})" class="w-9 h-9 grid place-items-center rounded-full text-sm font-semibold ${p===cur?'bg-[#8b7cff] text-white':'hover:bg-slate-100'}">${p}</button>`).join('')}
    <button onclick="goToPage(${cur+1})" ${cur===totalPages?'disabled':''} class="w-9 h-9 grid place-items-center rounded-full border border-slate-200 hover:bg-slate-100 disabled:opacity-30"><i class="ri-arrow-right-s-line"></i></button>
  </nav>`;
}

function goToPage(p) {
  STATE.page = Math.max(1, p);
  renderView();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function filterServices() {
  const sig = [STATE.category,STATE.country,STATE.ratingMin,STATE.priceMax,STATE.priceMin,STATE.verifiedOnly,STATE.availableOnly,STATE.sort,STATE.query,STATE.trendingActive].join('|');
  if (STATE._filterSig !== sig){ STATE._filterSig = sig; STATE.page = 1; }
  let arr = DB.services.filter(sv=>!sv.status||sv.status==='approved');
  if (STATE.category!=='all') arr = arr.filter(s=>s.category===STATE.category);
  if (STATE.country!=='all')  arr = arr.filter(s=>s.country===STATE.country);
  if (STATE.ratingMin>0)      arr = arr.filter(s=>s.rating>=STATE.ratingMin);
  if (STATE.priceMax>0)       arr = arr.filter(s=>s.price<=STATE.priceMax);
  if (STATE.priceMin>0)       arr = arr.filter(s=>s.price>=STATE.priceMin);
  if (STATE.verifiedOnly)     arr = arr.filter(s=>{ const u=getUser(s.freelancerId); return u && u.verified; });
  if (STATE.availableOnly)    arr = arr.filter(s=>{ const u=getUser(s.freelancerId); return u && u.online; });
  if (STATE.query) {
    const q = STATE.query.toLowerCase().trim();
    arr = arr.filter(s => s.title.toLowerCase().includes(q) || s.description.toLowerCase().includes(q));
  }
  switch(STATE.trendingActive ? 'trending' : STATE.sort){
    case 'rating':     arr.sort((a,b)=>b.rating-a.rating); break;
    case 'price_asc':  arr.sort((a,b)=>a.price-b.price); break;
    case 'price_desc': arr.sort((a,b)=>b.price-a.price); break;
    case 'recent':     arr.sort((a,b)=>b.createdTs-a.createdTs); break;
    default:           arr.sort((a,b)=>(b.rating*b.reviewsCount)-(a.rating*a.reviewsCount));
  }
  return arr;
}

function getFilteredGigs() {
  let list = DB.services.filter(s => s.status === 'approved' || !s.status);

    const catMap = {'Web Dev':'dev','UI/UX':'design','Mobile':'dev','Content':'writing','Video':'video','AI/ML':'ai','Marketing':'marketing','Blockchain':'dev','DevOps':'dev','Data':'dev'};

    list = list.filter(g => g.category === catId);
  }
  if (homeState.q.trim()) {
    const q = homeState.q.toLowerCase();
    list = list.filter(g => g.title.toLowerCase().includes(q) || g.description.toLowerCase().includes(q));

}

function showProfileTab(name, btn){
  document.querySelectorAll('#page-profile .tab').forEach(t => t.classList.remove('tab-active'));
  btn.classList.add('tab-active');
  ['gigs','about','skills'].forEach(n => { const el=document.getElementById('pane-'+n); if(el)el.classList.add('hidden'); });

}

  const done = orders.filter(o => o.status === 'approved');
  const tab = STATE.clientOrdersTab === 'done' ? 'done' : 'active';
  const listed = tab === 'done' ? done : active;
  
  return `
  <div class="grid grid-cols-2 gap-3 mb-5">

function freelancerActions(o) {

}

function confirmHire(serviceId, tierKey) {
  const s = getService(serviceId);
  const me = getUser(STATE.currentUserId);
  const total = +(s.price * 1.02).toFixed(2);
  if ((me ? me.balanceITL : 0) < total) { toast('Saldo insuficiente.', 'error'); return; }
  const hash = txHash();
  me.balanceITL = +((me.balanceITL || 0) - total).toFixed(2);
  const order = mkOrder(s, STATE.currentUserId, '', 'in_progress', 8);
  order.tier = tierKey;
  order.price = s.price;
  order.fee = +(s.price * 0.02).toFixed(2);
  order.total = total;
  order.escrowTx = hash;
  STATE.orders.unshift(order);
  STATE.txHistory.unshift({ hash, type:'escrow_lock', amount: total, token:'ITL', ts: Date.now(), orderId: order.id });
  STATE.messages[order.id] = [{ from: s.freelancerId, text: 'Olá! Acabei de receber o pedido. Vou começar agora 🚀', ts: nowTs() }];
  addNotification({ type:'tx', title:'Escrow confirmado', body:`${fmtITL(total)} travados • ${shortHash(hash)}`, link:'#/dashboard/client' });
  closeModal();
  toast('Pedido criado e tx confirmada!', 'success');
  renderView();
  if (order.status === 'awaiting_requirements') { setTimeout(() => openRequirementsModal(order.id), 500); }
}

function mkOrder(service, clientId, brief, status='in_progress', progress=10){
  const id = uid('o');
  const fee = +(service.price*0.02).toFixed(2);
  const createdTs = Date.now()-86400000*Math.floor(Math.random()*5+1);
  const deliveryAt = createdTs + service.deliveryDays*86400000;
  const hasReqs = Array.isArray(service.requirements) && service.requirements.length > 0;
  const initialStatus = (status==='in_progress' && hasReqs) ? 'awaiting_requirements' : status;
  return { id, serviceId: service.id, freelancerId: service.freelancerId, clientId, brief, status: initialStatus, progress, tier: 'standard', selectedAddons: [], token: 'ITL', price: service.price, fee, total: +(service.price+fee).toFixed(2), deliveryDays: service.deliveryDays, createdTs, deliveryAt, deliveredAt: null, deliverable: null, rated: false, clientRated: false, escrowTx: txHash(), milestones: null, dispute: null, cancelRequest: null, refundRequested: false, tipITL: 0, requirementsAnswers: null, requirementsSubmitted: initialStatus !== 'awaiting_requirements', requirementsSubmittedTs: initialStatus !== 'awaiting_requirements' ? createdTs : null };
}

function submitDelivery(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  const note = document.getElementById('deliver-note').value.trim() || 'Entrega anexada.';
  const fileEl = document.getElementById('deliver-file');
  const files = fileEl.files.length ? Array.from(fileEl.files).map(f => ({name:f.name, size:(f.size/1024).toFixed(0)+' KB'})) : [{name:'entrega.zip', size:'2.1 MB'}];
  o.status = 'delivered'; o.progress = 100; o.deliveredAt = Date.now(); o.deliverable = { files, note };
  STATE.messages[o.id] = STATE.messages[o.id] || [];
  STATE.messages[o.id].push({ from: o.freelancerId, text: '📦 Entrega enviada: ' + note, attachments: files, ts: nowTs() });
  addNotification({ type:'delivery', title:'Entrega recebida', body:`${files.length} arquivo(s) anexado(s)`, link:'#/dashboard/client' });
  closeModal();
  toast('Entrega enviada ao cliente!', 'success');
  renderView();
}

function approveOrder(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o || o.status !== 'delivered') return;
  const hash = txHash();
  o.releaseTx = hash;
  o.status = 'approved'; o.progress = 100; o.approvedAt = Date.now();
  const fl = getUser(o.freelancerId);
  if (fl) { fl.balanceITL = (fl.balanceITL || 0) + (o.price || 0); fl.jobs = (fl.jobs || 0) + 1; }
  STATE.txHistory.unshift({ hash, type:'escrow_release', amount: o.price, token:'ITL', ts: Date.now(), orderId });
  addNotification({ type:'tx', title:'Pagamento liberado', body:`${fmtITL(o.price)} liberados ao freelancer`, link:'#/dashboard/client' });
  toast('Entrega aprovada. ITL liberado!', 'success');
  renderView();
}

            <div>
              <label class="text-sm font-bold flex items-center gap-1.5"><span class="w-5 h-5 rounded-full bg-amber-100 text-amber-700 text-[10px] grid place-items-center font-extrabold">${i+1}</span>${escapeHtml(r.label)} ${r.required ? '<span class="text-rose-500">*</span>' : ''}</label>
              ${r.type === 'textarea' ? `<textarea id="reqf-${r.id}" rows="3" class="w-full border border-slate-200 rounded-xl px-3 py-2 mt-1 text-sm" placeholder="${escapeHtml(r.placeholder||'')}"></textarea>` : r.type === 'select' ? `<select id="reqf-${r.id}" class="w-full border border-slate-200 rounded-xl px-3 py-2 mt-1 text-sm"><option value="">— Selecione —</option>${(r.options||[]).map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}</select>` : `<input id="reqf-${r.id}" type="${r.type === 'url' ? 'url' : 'text'}" class="w-full border border-slate-200 rounded-xl px-3 py-2 mt-1 text-sm" placeholder="${escapeHtml(r.placeholder||'')}"/>`}
            </div>
          `).join('')}
        </form>
      </div>
      <div class="p-5 border-t border-slate-200 flex gap-2">
        <button onclick="closeModal()" class="flex-1 btn-outline rounded-lg font-semibold py-2.5 text-sm">Mais tarde</button>
        <button onclick="submitRequirements('${o.id}')" class="flex-[2] bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-lg flex items-center justify-center gap-2"><i class="ri-send-plane-fill"></i>Enviar formulário</button>
      </div>
    </div>
  </div>`;
}

function submitRequirements(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  const s = getService(o.serviceId);
  const reqs = s.requirements || [];
  const answers = {};
  let missing = null;
  for (const r of reqs) {
    const el = document.getElementById('reqf-'+r.id);
    if (!el) continue;
    const val = (el.value || '').trim();
    if (r.required && !val) { missing = r.label; break; }
    answers[r.id] = val;
  }
  if (missing) { toast('Preencha o campo obrigatório: '+missing, 'warn'); return; }
  o.requirementsAnswers = answers;
  o.requirementsSubmitted = true;
  o.requirementsSubmittedTs = Date.now();
  o.status = 'in_progress';
  o.deliveryAt = Date.now() + (o.deliveryDays || s.deliveryDays || 7) * 86400000;
  o.progress = Math.max(o.progress || 0, 10);
  STATE.messages[o.id] = STATE.messages[o.id] || [];
  STATE.messages[o.id].push({ from: o.clientId, text: '📋 Formulário enviado! O prazo de entrega começou.', ts: nowTs() });
  addNotification({ type:'message', title:'Formulário recebido', body:`Cliente enviou o formulário do pedido #${o.id.slice(-5)}`, link:'#/dashboard/freelancer' });
  closeModal();
  toast('Formulário enviado. Prazo iniciado!', 'success');
  renderView();
}

function createService() {
  const title = document.getElementById('ns-title').value.trim();
  const cat = document.getElementById('ns-cat').value;
  const co = document.getElementById('ns-co').value;
  const price = parseFloat(document.getElementById('ns-price').value) || 0;
  const days = parseInt(document.getElementById('ns-days').value) || 7;
  const desc = document.getElementById('ns-desc').value.trim();
  const inc = document.getElementById('ns-inc').value.split(',').map(x => x.trim()).filter(Boolean);
  const tags = document.getElementById('ns-tags').value.split(',').map(x => x.trim().toLowerCase()).filter(Boolean).slice(0,10);
  if (!title || !desc || !price) { toast('Preencha título, descrição e preço.', 'warn'); return; }
  const svc = { id: uid('s'), title, category: cat, freelancerId: STATE.currentUserId, price, deliveryDays: days, country: co, rating: 5, reviewsCount: 0, includes: inc.length ? inc : ['Pacote padrão'], description: desc, thumb: STATE.newServiceLogo || thumbSVG(title, getCategory(cat).color), gallery: STATE.newServiceGallery.slice(), tags, requirements: STATE.newServiceRequirements, faqs: STATE.newServiceFaqs, status: 'approved', createdTs: Date.now(), reviews: [], _mock: true };
  DB.services.unshift(svc);
  toast('Serviço publicado com sucesso!', 'success');
  STATE.route = 'dashboard';
  STATE.dashboardTab = 'freelancer';
  renderView();

function deleteService(id) {
  const s = getService(id);
  if (!s) return;
  if (!confirm(`Excluir o serviço "${s.title}"?`)) return;
  const idx = DB.services.findIndex(x => x.id === id);
  if (idx >= 0) DB.services.splice(idx, 1);
  toast('Serviço excluído.', 'success');
  renderView();
}

async function adminLogin() {
  const email = document.getElementById('admin-email').value;
  const pwd = document.getElementById('admin-pwd').value;
  if (!email || !pwd) { toast('Preencha email e senha.', 'warn'); return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) { toast('Erro: '+error.message, 'error'); return; }
  STATE.isAdmin = true;
  renderView();
}

async function adminApprove(id) {
  if (SB_READY && sb) {
    await sb.from('services').update({ status: 'approved', approved_at: new Date().toISOString() }).eq('id', id);
    const s = getService(id); if (s) s.status = 'approved';
    toast('Serviço aprovado!', 'success');
    renderView();
  }
}

async function adminReject(id) {
  const reason = prompt('Motivo da rejeição:');
  if (reason === null) return;
  if (SB_READY && sb) {
    await sb.from('services').update({ status: 'rejected', rejected_reason: reason }).eq('id', id);
    const s = getService(id); if (s) { s.status = 'rejected'; s.rejectedReason = reason; }
    toast('Serviço rejeitado.', 'warn');
    renderView();
  }
}

/* ---------- CHAT ---------- */
function openChat(orderId, otherUserId) {
  if (!requireAuth('usar o chat')) return;
  let order = orderId ? STATE.orders.find(o => o.id === orderId) : STATE.orders.find(o => o.freelancerId === otherUserId && o.clientId === STATE.currentUserId);
  let ephemeral = false;
  if (!order) {
    order = { id: 'pre_'+otherUserId, clientId: STATE.currentUserId, freelancerId: otherUserId, serviceId: null, status: 'in_progress', progress: 0 };
    ephemeral = true;
    STATE.messages[order.id] = STATE.messages[order.id] || [{ id: uid('m'), from: otherUserId, text: 'Oi! Como posso ajudar?', ts: nowTs(), status: 'read' }];
  }
  STATE.chatOpenOrderId = order.id;
  renderChat(order, ephemeral);
}

function closeChat() {
  STATE.chatOpenOrderId = null;
  document.getElementById('chat-root').innerHTML = '';
}

function renderChat(order, ephemeral) {
  const other = getUser(order.clientId === STATE.currentUserId ? order.freelancerId : order.clientId);
  const svc = order.serviceId ? getService(order.serviceId) : null;
  const msgs = STATE.messages[order.id] || [];
  
  document.getElementById('chat-root').innerHTML = `
  <div class="chat-drawer">
    <div class="overlay" onclick="closeChat()"></div>
    <div class="panel">
      <div class="p-4 border-b border-slate-200 flex items-center gap-3 shrink-0">
        <div class="w-10 h-10 rounded-full grid place-items-center font-bold text-slate-700" style="background:${other ? other.iconColor || '#fecaca' : '#fecaca'}">${other ? (other.name||'U')[0].toUpperCase() : 'U'}</div>
        <div class="flex-1 min-w-0">
          <div class="font-bold text-sm">${other ? escapeHtml(other.name) : 'Usuário'}</div>
          <div class="text-[11px] text-slate-500 truncate">${svc ? escapeHtml(svc.title) : 'Conversa'}</div>
        </div>
        <button onclick="closeChat()" class="w-8 h-8 grid place-items-center rounded-lg hover:bg-slate-100"><i class="ri-close-line"></i></button>
      </div>
      <div id="chat-stream" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
        ${msgs.map(m => chatBubble(m)).join('') || '<div class="text-center text-slate-500 text-xs py-8">Inicie a conversa</div>'}
      </div>
      <form id="chat-form" class="p-3 border-t border-slate-200 flex gap-2 shrink-0" onsubmit="event.preventDefault();sendChatMessage('${order.id}')">
        <input type="text" id="chat-input" placeholder="Digite uma mensagem…" class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-[#8b7cff]"/>
        <button type="submit" class="w-10 h-10 grid place-items-center rounded-xl bg-[#8b7cff] hover:bg-[#7a6bf0] text-white shrink-0"><i class="ri-send-plane-fill"></i></button>
      </form>
    </div>
  </div>`;
  
  const stream = document.getElementById('chat-stream');
  if (stream) stream.scrollTop = stream.scrollHeight;
}

function chatBubble(m) {
  const mine = m.from === STATE.currentUserId;
  const u = getUser(m.from);
  return `
  <div class="flex items-end gap-2 ${mine ? 'flex-row-reverse' : ''}">
    <div class="w-7 h-7 rounded-full grid place-items-center text-[11px] font-bold shrink-0" style="background:${u ? u.iconColor || '#fecaca' : '#fecaca'}">${u ? (u.name||'U')[0].toUpperCase() : 'U'}</div>
    <div class="max-w-[80%] px-3 py-2 rounded-2xl ${mine ? 'bg-[#8b7cff] text-white rounded-br-sm' : 'bg-white border border-slate-200 rounded-bl-sm'}">
      <div class="text-sm leading-snug">${escapeHtml(m.text)}</div>
      <div class="text-[10px] ${mine ? 'text-white/70' : 'text-slate-500'} mt-0.5">${timeAgo(m.ts)}</div>
    </div>
  </div>`;
}

function sendChatMessage(orderId) {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const o = STATE.orders.find(x => x.id === orderId) || { id: orderId };
  STATE.messages[orderId] = STATE.messages[orderId] || [];
  const msg = { id: uid('m'), from: STATE.currentUserId, text, ts: nowTs(), status: 'sent' };
  STATE.messages[orderId].push(msg);
  renderChat(o, true);
  // Simulate reply
  setTimeout(() => {
    if (STATE.chatOpenOrderId !== orderId) return;
    const replies = ['Combinado!', 'Já estou nisso.', 'Pode me mandar mais detalhes?', 'Vou começar agora.'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    STATE.messages[orderId].push({ id: uid('m'), from: o.freelancerId || 'u_ana', text: reply, ts: nowTs(), status: 'read' });
    renderChat(o, true);
  }, 1500);
}
