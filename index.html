function closeModal(){ $('#modal-root').innerHTML = ''; sbUnsubscribeDispute(); }
(function initModalScrollLock(){
  const root = document.getElementById('modal-root');
  if (!root) return;
  const mo = new MutationObserver(() => {
    if (root.children.length > 0) document.body.classList.add('modal-open-lock');
    else document.body.classList.remove('modal-open-lock');
  });
  mo.observe(root, { childList: true });
})();

/* ---------- Service detail gallery (Fiverr-style) ---------- */
function galleryImages(sid){
  const s = getService(sid);
  if (!s) return [];
  return [s.thumb, ...(s.gallery||[])].filter(Boolean);
}
function galleryGo(sid, idx){
  const imgs = galleryImages(sid);
  if (!imgs.length) return;
  const i = ((idx % imgs.length) + imgs.length) % imgs.length;
  const main = document.getElementById('gig-main-'+sid);
  const counter = document.getElementById('gig-counter-'+sid);
  if (main){ main.src = imgs[i]; main.dataset.idx = i; }
  if (counter) counter.textContent = (i+1)+' / '+imgs.length;
  document.querySelectorAll(`[data-gallery-id="${sid}"] [data-thumb-idx]`).forEach(b => {
    const active = parseInt(b.dataset.thumbIdx) === i;
    b.style.borderColor = active ? '#1a73e8' : '#e2e8f0';
  });
}
function galleryNav(sid, dir){
  const main = document.getElementById('gig-main-'+sid);
  const cur = main ? parseInt(main.dataset.idx || '0') : 0;
  galleryGo(sid, cur + dir);
}
function openLightbox(sid, idx){
  const imgs = galleryImages(sid);
  if (!imgs.length) return;
  const i = Math.max(0, Math.min(idx, imgs.length-1));
  $('#modal-root').innerHTML = `
  <div class="fixed inset-0 z-[60] bg-black/90 grid place-items-center p-4 fade-in" onclick="if(event.target===this)closeModal()">
    <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 grid place-items-center rounded-full bg-white/10 hover:bg-white/20 text-white">
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
    ${imgs.length>1 ? `
      <button onclick="lightboxNav('${sid}',-1)" class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 grid place-items-center rounded-full bg-white/10 hover:bg-white/20 text-white">
        <i data-lucide="chevron-left" class="w-6 h-6"></i>
      </button>
      <button onclick="lightboxNav('${sid}',1)" class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 grid place-items-center rounded-full bg-white/10 hover:bg-white/20 text-white">
        <i data-lucide="chevron-right" class="w-6 h-6"></i>
      </button>
    ` : ''}
    <img id="lightbox-img" data-sid="${sid}" data-idx="${i}" src="${imgs[i]}" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-pop"/>
    ${imgs.length>1 ? `<div id="lightbox-counter" class="absolute bottom-6 left-1/2 -translate-x-1/2 px-3 py-1.5 rounded-full bg-white/15 text-white text-sm font-bold">${i+1} / ${imgs.length}</div>` : ''}
  </div>`;
  icons();
}
function lightboxNav(sid, dir){
  const img = document.getElementById('lightbox-img');
  if (!img) return;
  const imgs = galleryImages(sid);
  const cur = parseInt(img.dataset.idx || '0');
  const next = ((cur + dir) % imgs.length + imgs.length) % imgs.length;
  img.src = imgs[next];
  img.dataset.idx = next;
  const counter = document.getElementById('lightbox-counter');
  if (counter) counter.textContent = (next+1)+' / '+imgs.length;
  galleryGo(sid, next); // keep underlying gallery in sync
}

function confirmHire(serviceId, tierKey){
  const briefEl = document.getElementById('hire-brief');
  const brief = briefEl ? briefEl.value.trim() : '';
  // Brief é opcional no modal compacto — cliente preenche depois no formulário de briefing
  const s = getService(serviceId);
  const tier = { priceITL: s.price, days: s.deadline||s.days||7, label:'Padrão', revisions: 2, includes: s.includes||[] };
  const me = getUser(STATE.currentUserId);
  const total = +(tier.priceITL*1.02).toFixed(2);
  if (me.balanceITL < total){ toast('Saldo insuficiente.', 'error'); return; }

  // Check if milestones are enabled
  const msToggle = document.getElementById('hire-milestones-toggle');
  const useMilestones = msToggle && msToggle.checked;
  let milestonesConfig = null;
  if (useMilestones) {
    const preset = MILESTONE_PRESETS[window._hireMilestonePreset || 0];
    milestonesConfig = preset.pcts.map((pct, i) => ({
      id: uid('ms'),
      name: preset.names[i],
      pct,
      amountITL: +((tier.priceITL * pct / 100)).toFixed(2),
      status: i === 0 ? 'pending' : 'locked',
      releaseTx: null,
      releasedAt: null,
    }));
  }

  // === QR PAYMENT FLOW — igual WalletConnect / LinkersMap ===
  const hash = txHash();
  const url  = explorerURL(hash);

  // Gerar QR code via API pública (nenhuma dependência extra)
  // Payload: "interlink:pay?to=0xINTERWORK&amount=TOTAL&token=ITL&memo=ORDER_ID"
  const qrPayload = encodeURIComponent(`interlink:pay?to=0xInterworkEscrow7C3AED&amount=${total}&token=ITL&ref=${hash.slice(0,12)}`);
  const qrUrl     = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&qzone=2&data=${qrPayload}`;

  $('#modal-root').innerHTML = `
  <div class="fixed inset-0 z-50 bg-ink-900/60 backdrop-blur-sm grid place-items-center p-4 fade-in">
    <div id="tx-card" class="bg-white w-full max-w-sm rounded-2xl shadow-pop overflow-hidden">

      <!-- Header -->
      <div class="px-5 py-4 border-b border-ink-100 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-brand-50 grid place-items-center shrink-0">
          <i data-lucide="qr-code" class="w-5 h-5 text-brand-500"></i>
        </div>
        <div>
          <div class="font-extrabold text-sm">Aprovação de pagamento</div>
          <div class="text-xs text-ink-500">Escaneie com sua carteira para confirmar</div>
        </div>
      </div>

      <div class="px-5 py-5 space-y-4">

        <!-- QR Code centralizado -->
        <div class="flex flex-col items-center">
          <div class="w-48 h-48 rounded-2xl border-2 border-ink-100 overflow-hidden bg-white p-2">
            <img src="${qrUrl}" class="w-full h-full object-contain" alt="QR Code de pagamento"/>
          </div>
          <div class="mt-2 text-[11px] text-ink-400 text-center">Escaneie com ITLX, MetaMask ou qualquer carteira EVM</div>
        </div>

        <!-- Valor em destaque -->
        <div class="rounded-xl bg-brand-50 border border-brand-100 px-4 py-3 flex items-center justify-between">
          <div>
            <div class="text-xs text-ink-500">Total em escrow</div>
            <div class="font-extrabold text-xl text-brand-700">${fmtITL(total)}</div>
          </div>
          <div class="text-right">
            <div class="text-xs text-ink-500">Token</div>
            <div class="font-bold text-sm text-brand-600">ITL</div>
          </div>
        </div>

        <!-- Status aguardando -->
        <div id="qr-status" class="flex items-center gap-2.5 rounded-xl bg-amber-50 border border-amber-100 px-3 py-2.5 text-xs text-amber-800">
          <i data-lucide="loader-2" class="w-4 h-4 text-amber-500 animate-spin shrink-0"></i>
          <span>Aguardando aprovação na carteira…</span>
        </div>

        <!-- Botão "Já aprovei" -->
        <button id="qr-confirm-btn"
          onclick="qrConfirmPayment(${JSON.stringify(serviceId)}, ${JSON.stringify(tierKey||STATE.selectedTier)}, ${JSON.stringify(brief)}, ${JSON.stringify(total)}, ${JSON.stringify(hash)}, ${JSON.stringify(tier)}, ${JSON.stringify(milestonesConfig)})"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 transition">
          <i data-lucide="check-circle" class="w-4 h-4"></i>Já aprovei na carteira
        </button>
        <button onclick="closeModal()" class="w-full border border-ink-100 hover:bg-ink-50 font-semibold py-2 rounded-xl text-sm text-ink-500">Cancelar</button>
      </div>
    </div>
  </div>`;
  icons();

  // Simular detecção automática após 8s (como WalletConnect faz)
  const qrTimer = setTimeout(()=>{
    const btn = document.getElementById('qr-confirm-btn');
    const status = document.getElementById('qr-status');
    if(status){
      status.innerHTML = '<i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500 shrink-0"></i><span class="text-emerald-700 font-semibold">Transação detectada! Clique para confirmar.</span>';
      if(typeof lucide !== 'undefined') lucide.createIcons();
    }
    if(btn){ btn.classList.add('animate-pulse'); }
  }, 8000);
  window._qrTimer = qrTimer;

  // Não continua automaticamente — espera o usuário clicar "Já aprovei"
  return;
}

function qrConfirmPayment(serviceId, tierKey, brief, total, hash, tier, milestonesConfig){
  if(window._qrTimer){ clearTimeout(window._qrTimer); }
  const url = explorerURL(hash);
  const s  = getService(serviceId);
  const me = getUser(STATE.currentUserId);

  // Mostrar confirmando
  const status = document.getElementById('qr-status');
  const btn    = document.getElementById('qr-confirm-btn');
  if(status){ status.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 text-brand-500 animate-spin shrink-0"></i><span>Confirmando on-chain…</span>'; if(typeof lucide !== 'undefined') lucide.createIcons(); }
  if(btn){ btn.disabled = true; btn.textContent = 'Confirmando…'; }

  setTimeout(async ()=>{
    me.balanceITL = +(me.balanceITL - total).toFixed(2);
    const order = mkOrder(s, STATE.currentUserId, brief, 'in_progress', 8);
    order.tier = tierKey;
    order.price = tier.priceITL;
    order.fee = +(tier.priceITL*0.02).toFixed(2);
    order.total = total;
    order.deliveryDays = tier.days;
    order.deliveryAt = Date.now()+tier.days*86400000;
    order.escrowTx = hash;
    if (milestonesConfig) order.milestones = milestonesConfig;

    // ADICIONADO — tenta salvar o pedido de verdade no Supabase (tabela "orders").
    // Se não houver sessão real (wallet) ou o vendedor ainda não tiver freelancer_uuid,
    // sbCreateOrder retorna { error } e o pedido continua funcionando só localmente,
    // exatamente como já funcionava antes desta mudança.
    try {
      const { data: sbOrder, error: sbOrderError } = await sbCreateOrder(order, s.freelancerUuid);
      if (sbOrder) {
        order.sbId = sbOrder.id; // UUID real do Supabase, guardado à parte do id local
        console.log('✅ Pedido salvo no Supabase:', sbOrder.id);
      } else if (sbOrderError) {
        console.warn('[Supabase] Pedido não salvo no banco (seguindo apenas local):', sbOrderError.message);
      }
    } catch (e) {
      console.warn('[Supabase] Falha inesperada ao salvar pedido:', e);
    }

    STATE.orders.unshift(order);
    STATE.txHistory.unshift({ hash, type:'escrow_lock', amount: total, token:'ITL', ts: Date.now(), orderId: order.id });
    STATE.messages[order.id] = [
      { from:s.freelancerId, text:`Olá! Acabei de receber o pedido${milestonesConfig?` (${milestonesConfig.length} milestones configurados)`:''}. Vou começar agora 🚀`, ts: nowTs() }
    ];
    addNotification({ type:'tx', title:'Escrow confirmado', body:`${fmtITL(total)} travados${milestonesConfig?' em '+milestonesConfig.length+' etapas':''} • ${shortHash(hash)}`, link:'#/dashboard/client' });

    const needsReqs = order.status === 'awaiting_requirements';

    // success card
    $('#modal-root').innerHTML = `
    <div class="fixed inset-0 z-50 bg-ink-900/60 backdrop-blur-sm grid place-items-center p-4 fade-in" onclick="if(event.target===this)closeModal()">
      <div class="bg-white w-full max-w-md rounded-2xl shadow-pop overflow-hidden">
        <div class="p-6 text-center">
          <div class="w-14 h-14 rounded-full bg-emerald-50 grid place-items-center mx-auto">
            <i data-lucide="check-circle-2" class="w-8 h-8 text-emerald-600"></i>
          </div>
          <div class="font-extrabold text-lg mt-3">Escrow travado on-chain</div>
          <div class="text-sm text-ink-500 mt-1">${fmtITL(total)} bloqueados${milestonesConfig?' em '+milestonesConfig.length+' etapas':' até sua aprovação'}</div>
          <div class="mt-3 flex items-start gap-2 text-left text-xs bg-brand-50/60 border border-brand-100 rounded-xl p-3">
            <i data-lucide="lock" class="w-4 h-4 text-brand-500 mt-0.5 shrink-0" aria-hidden="true"></i>
            <span class="text-ink-700">🔒 <b>Pagamento protegido:</b> o freelancer só recebe quando você aprovar a entrega.</span>
          </div>
          ${milestonesConfig ? `
          <div class="mt-4 rounded-xl bg-brand-50 border border-brand-100 p-3 text-left text-xs space-y-2">
            <div class="font-bold text-brand-700 flex items-center gap-1.5"><i data-lucide="milestone" class="w-3.5 h-3.5"></i>Milestones configurados</div>
            ${milestonesConfig.map((ms,i)=>`
              <div class="flex items-center justify-between">
                <span class="text-ink-700">${i+1}. ${escapeHtml(ms.name)}</span>
                <span class="font-semibold text-brand-700">${fmtITL(ms.amountITL)} (${ms.pct}%)</span>
              </div>`).join('')}
          </div>` : ''}
          ${needsReqs ? `
          <div class="mt-4 rounded-xl bg-amber-50 border border-amber-200 p-3 text-left text-xs flex items-start gap-2">
            <i data-lucide="clipboard-list" class="w-4 h-4 text-amber-700 mt-0.5 shrink-0"></i>

          </div>` : ''}
          <div class="mt-4 rounded-xl bg-ink-100/40 border border-ink-100 p-3 text-left text-xs">
            <div class="flex items-center justify-between mb-1">
              <span class="text-ink-500">Block</span>

            <div class="flex items-center justify-between mb-1">

            </div>

          <div class="mt-4 flex gap-2">

/* ---------- CHAT DRAWER ---------- */
function openChat(orderId, otherUserId){
  if (!requireAuth('usar o chat')) return;
  let order = orderId ? STATE.orders.find(o=>o.id===orderId) : STATE.orders.find(o=>o.freelancerId===otherUserId && o.clientId===STATE.currentUserId);
  let ephemeral = false;
  if (!order){
    order = { id:'pre_'+otherUserId, clientId:STATE.currentUserId, freelancerId:otherUserId, serviceId:null, status:'in_progress', progress:0 };
    ephemeral = true;
    STATE.messages[order.id] = STATE.messages[order.id] || [{ id:uid('m'), from:otherUserId, text:'Oi! Como posso ajudar com seu projeto?', ts:nowTs(), status:'read' }];
  }
  STATE.chatOpenOrderId = order.id;
  markChatAsRead(order.id);
  renderChat(order, ephemeral);

  // ── Supabase: carrega histórico real + abre Realtime ──
  // Só funciona se houver sbId (UUID real do Supabase) — chats locais continuam mock
  if (SB_READY && sb && STATE.sbProfile?.id && order.sbId) {
    sbLoadMessages(order).then(() => {
      if (STATE.chatOpenOrderId === order.id) renderChat(order, ephemeral);
    });
    sbSubscribeChat(order, ephemeral);
  }
}

function closeChat(){
  STATE.chatOpenOrderId = null;
  $('#chat-root').innerHTML = '';
  window._chatPendingAttachments = [];
  sbUnsubscribeChat(); // cancela canal Realtime se ativo
}

/* Mark every one of my outgoing messages as "read" once the other side has — in this demo,
   opening/keeping the chat open is what triggers the other party to have "seen" my messages. */
function markChatAsRead(orderId){
  const msgs = STATE.messages[orderId];
  if (!msgs) return;
  msgs.forEach(m=>{ if (m.from===STATE.currentUserId && m.status && m.status!=='read') m.status='read'; });
}

/* Chat attachment staging — persists while drawer is open */
window._chatPendingAttachments = window._chatPendingAttachments || [];

function renderChat(order, ephemeral){
  const other = getUser(order.clientId===STATE.currentUserId ? order.freelancerId : order.clientId);
  const svc = order.serviceId ? getService(order.serviceId) : null;
  const msgs = STATE.messages[order.id] || [];

    <aside class="absolute right-0 top-0 h-full w-full sm:w-[420px] bg-white shadow-2xl pointer-events-auto flex flex-col fade-in">

      <!-- Header -->
      <div class="p-4 border-b border-ink-100 flex items-center gap-3">
        <img src="${other.avatar}" class="w-10 h-10 rounded-xl"/>
        <div class="flex-1 min-w-0">
          <div class="font-bold text-sm flex items-center gap-1">${other.name} ${other.verified?'<i data-lucide="badge-check" class="w-4 h-4 text-brand-500"></i>':''}</div>
          <div id="chat-subtitle" class="text-[11px] text-ink-500 truncate">${svc?escapeHtml(svc.title):'Conversa preliminar'}</div>
        </div>

      </div>

      <!-- Progress stepper (if order) -->
      ${!ephemeral && svc ? `
      <div class="px-4 py-3 bg-ink-100/40 border-b border-ink-100 text-xs">
        <div class="flex items-center justify-between gap-2 mb-2">
          ${statusChip(order.status)}
        </div>

      </div>` : ''}

      <!-- Messages stream -->
      <div id="chat-stream" class="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-3 bg-gradient-to-b from-white to-ink-100/30">
        ${msgs.map(m=>chatBubble(m)).join('') || `<div class="text-center text-ink-500 text-xs py-8">Inicie a conversa</div>`}
      </div>

      <!-- Attachment staging area (shown when files are queued) -->
      <div id="chat-attach-staging" class="hidden px-3 pt-2 pb-0 border-t border-ink-100 bg-ink-100/20">
        <div class="flex items-center gap-1 mb-1.5">
          <i data-lucide="paperclip" class="w-3 h-3 text-ink-500"></i>
          <span class="text-[11px] font-bold text-ink-500 uppercase tracking-wider">Anexos prontos para enviar</span>
        </div>
        <div id="chat-attach-list" class="flex flex-wrap gap-1.5 pb-2"></div>
      </div>

      <!-- Input form -->
      <form id="chat-form" class="p-3 border-t border-ink-100 flex items-end gap-2" role="form" aria-label="Enviar mensagem">
        <!-- Hidden file input -->
        <input type="file" id="chat-file-input" multiple accept="image/*,.pdf,.doc,.docx,.zip,.txt,.xls,.xlsx,.ppt,.pptx,.mp4,.mov,.fig,.sketch" class="sr-only" aria-label="Selecionar arquivo para anexar"/>

        <!-- Paperclip button (now triggers file input) -->
        <button type="button" id="chat-attach-btn" aria-label="Anexar arquivo"
          class="w-9 h-9 grid place-items-center rounded-lg hover:bg-brand-50 hover:text-brand-600 text-ink-500 transition shrink-0 self-center">
          <i data-lucide="paperclip" class="w-4 h-4" aria-hidden="true"></i>
        </button>

        <label for="chat-input" class="sr-only">Mensagem</label>
        <textarea id="chat-input" rows="1" autocomplete="off"
          placeholder="Digite uma mensagem…" aria-label="Digite uma mensagem"
          class="flex-1 border border-ink-100 rounded-xl px-3 py-2 text-sm outline-none focus:border-brand-300 resize-none max-h-28 overflow-y-auto scrollbar-thin"
          style="field-sizing:content;min-height:36px;"></textarea>

        <button type="submit" aria-label="Enviar mensagem"
          class="w-10 h-10 grid place-items-center rounded-xl bg-brand-500 hover:bg-brand-600 text-white shrink-0 self-end transition">
          <i data-lucide="send" class="w-4 h-4" aria-hidden="true"></i>
        </button>
      </form>
    </aside>
  </div>`;

  icons();

  // Scroll to bottom
  const stream = $('#chat-stream');
  if (stream) stream.scrollTop = stream.scrollHeight;

  // Re-render staging area from current pending attachments
  renderChatStagingArea();

  // Wire up paperclip → file input
  const attachBtn = document.getElementById('chat-attach-btn');
  const fileInput = document.getElementById('chat-file-input');
  if (attachBtn && fileInput){
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleChatFileSelect(e, order));
  }

  // Auto-grow textarea
  const textarea = document.getElementById('chat-input');
  if (textarea){
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 112) + 'px';
    });
    // Also allow Shift+Enter for newline, Enter to submit
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        document.getElementById('chat-form').dispatchEvent(new Event('submit'));
      }
    });
  }

  // Form submit
  document.getElementById('chat-form').addEventListener('submit', e => {
    e.preventDefault();
    const v = (document.getElementById('chat-input')?.value || '').trim();
    const pending = window._chatPendingAttachments || [];
    if (!v && !pending.length) return;

    const msg = { id: uid('m'), from: STATE.currentUserId, text: v || '', ts: nowTs(), status:'sent' };
    if (pending.length){
      msg.attachments = pending.map(a => ({
        name: a.name,
        size: a.size,
        type: a.type,
        dataURL: a.dataURL || null,
      }));
    }

    STATE.messages[order.id] = STATE.messages[order.id] || [];
    STATE.messages[order.id].push(msg);
    window._chatPendingAttachments = [];

    renderChat(order, ephemeral);

    // ── Supabase: persiste mensagem no banco (só se pedido tem UUID real) ──
    const hasSbOrder = SB_READY && sb && STATE.sbProfile?.id && order.sbId;
    if (hasSbOrder) {
      // Monta attachment_url: usa o primeiro arquivo não-imagem como URL,
      // ou o nome do arquivo de imagem (dataURL fica só local)
      const firstAttach = msg.attachments?.[0];
      const attachmentUrl = firstAttach
        ? (firstAttach.dataURL ? `[imagem:${firstAttach.name}]` : firstAttach.name)
        : null;

      sbSendMessage(order.sbId, v, attachmentUrl).then(saved => {
        if (saved) {
          msg._sbId = saved.id; // guarda o UUID real da mensagem
          msg.status = 'delivered';
          if (STATE.chatOpenOrderId === order.id) renderChat(order, ephemeral);
        }
      });
      // Não mostra respostas simuladas — a resposta real chegará via Realtime
      return;
    }

    // ── Modo demo (sem sbId): comportamento original com respostas simuladas ──
    // 1) "Delivered" tick
    setTimeout(() => {
      if (msg.status === 'sent') msg.status = 'delivered';
      if (STATE.chatOpenOrderId === order.id) renderChat(order, ephemeral);
    }, 500);

    // 2) Typing indicator
    setTimeout(() => {
      if (STATE.chatOpenOrderId !== order.id) return;
      const stream = document.getElementById('chat-stream');
      if (stream && !document.getElementById('chat-typing-indicator')){
        stream.insertAdjacentHTML('beforeend', chatTypingBubble(other));
        stream.scrollTop = stream.scrollHeight;
      }
      const subtitle = document.getElementById('chat-subtitle');
      if (subtitle) subtitle.textContent = tr('digitando…');
    }, 750);

    // 3) Simulated reply
    setTimeout(() => {
      const fileReplies = ['Recebi os arquivos, obrigado!','Ótimo, já estou analisando.','Perfeito, vou usar como referência.'];
      const textReplies = ['Combinado!','Já estou nisso.','Pode me mandar o briefing detalhado?','Vou subir um preview hoje.','Posso adiantar parte da entrega.'];
      const pool = msg.attachments ? fileReplies : textReplies;
      msg.status = 'read';
      STATE.messages[order.id].push({ id: uid('m'), from: other.id, text: pool[Math.floor(Math.random()*pool.length)], ts: nowTs(), status:'read' });
      if (STATE.chatOpenOrderId === order.id) renderChat(order, ephemeral);
    }, 2100);
  });
}

/* Read selected files, build preview dataURLs, add to pending queue */
function handleChatFileSelect(e, order){
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  e.target.value = '';

  const MAX_FILES = 5;
  const MAX_SIZE_MB = 20;
  const current = window._chatPendingAttachments || [];

  let added = 0;
  files.forEach(file => {
    if (current.length + added >= MAX_FILES){
      toast(`Máx ${MAX_FILES} arquivos por mensagem.`, 'warn'); return;
    }
    if (file.size > MAX_SIZE_MB * 1024 * 1024){
      toast(`${file.name}: máx ${MAX_SIZE_MB}MB por arquivo.`, 'warn'); return;
    }

    const entry = {
      id: uid('att'),
      name: file.name,
      size: formatFileSize(file.size),
      type: file.type,
      dataURL: null,
    };

    if (file.type.startsWith('image/')){
      const reader = new FileReader();
      reader.onload = ev => {
        entry.dataURL = ev.target.result;
        renderChatStagingArea();
      };
      reader.readAsDataURL(file);
    }

    current.push(entry);
    added++;
  });

  window._chatPendingAttachments = current;
  renderChatStagingArea();
  if (added) toast(added === 1 ? '1 arquivo pronto para enviar.' : `${added} arquivos prontos.`, 'info');
}

/* Render the staging strip above the input */

  const staging = document.getElementById('chat-attach-staging');

    list.innerHTML = '';

         style="max-width:140px;" title="${escapeHtml(a.name)}">

        ? `<img src="${a.dataURL}" class="w-10 h-10 object-cover shrink-0" alt="${escapeHtml(a.name)}"/>`

        class="absolute top-0.5 right-0.5 w-4 h-4 rounded-full bg-ink-900/60 hover:bg-rose-500 text-white grid place-items-center opacity-0 group-hover:opacity-100 transition"
        aria-label="Remover anexo">

          <line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/>
        </svg>
      </button>

  }).join('');

  // Re-init lucide icons on the newly injected markup

}

function removeChatAttachment(idx){
  const pending = window._chatPendingAttachments || [];
  pending.splice(idx, 1);
  window._chatPendingAttachments = pending;
  renderChatStagingArea();

/* Helpers */
function formatFileSize(bytes){
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function fileTypeIcon(name){
  const ext = (name || '').split('.').pop().toLowerCase();
  const map = {
    pdf:'file-text', doc:'file-text', docx:'file-text',
    xls:'table-2', xlsx:'table-2',
    ppt:'presentation', pptx:'presentation',
    zip:'archive', rar:'archive', gz:'archive',
    mp4:'video', mov:'video', avi:'video',
    mp3:'music', wav:'music',
    fig:'figma', sketch:'pen-tool',
    txt:'align-left',
    png:'image', jpg:'image', jpeg:'image', gif:'image', webp:'image', svg:'image',
  };
  return map[ext] || 'file';
}

/* ============================================================
 * AUTO-APPROVE ENGINE
 * Pedidos no status "delivered" são aprovados automaticamente
 * após AUTO_APPROVE_DAYS dias sem ação do cliente.
 * ============================================================ */
const AUTO_APPROVE_DAYS = 3;   // ← altere aqui para mudar o prazo global
const AUTO_APPROVE_MS   = AUTO_APPROVE_DAYS * 24 * 60 * 60 * 1000;

/**
 * Retorna o timestamp em que um pedido será auto-aprovado.
 * Base: deliveredAt + AUTO_APPROVE_MS
 */
function autoApproveDeadline(order){
  if (!order || order.status !== 'delivered' || !order.deliveredAt) return null;
  if (order.dispute) return null; // disputa suspende o prazo
  return order.deliveredAt + AUTO_APPROVE_MS;
}

/**
 * Texto legível do countdown: "2d 14h" / "3h 22m" / "Expirado"
 */
function autoApproveCountdown(order){
  const dl = autoApproveDeadline(order);
  if (!dl) return null;
  const remaining = dl - Date.now();
  if (remaining <= 0) return null; // já será processado pelo engine
  const d = Math.floor(remaining / 86400000);
  const h = Math.floor((remaining % 86400000) / 3600000);
  const m = Math.floor((remaining % 3600000) / 60000);
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

/**
 * Executa a aprovação automática para todos os pedidos vencidos.
 * Chamado no boot e a cada minuto.
 */
function runAutoApprove(){
  let changed = false;
  STATE.orders.forEach(o => {
    if (o.status !== 'delivered') return;
    const dl = autoApproveDeadline(o);
    if (!dl || Date.now() < dl) return;

    // — Perform the same logic as approveOrder but without UI side-effects —
    const hash = txHash();
    o.releaseTx = hash;
    o.status = 'approved';
    o.progress = 100;
    o.approvedAt = Date.now();
    o.autoApproved = true; // flag so the UI can show a badge

    const fl = getUser(o.freelancerId);
    if (fl){
      fl.balanceITL = +((fl.balanceITL || 0) + (o.price || 0)).toFixed(2);
      fl.jobs = (fl.jobs || 0) + 1;
    }

    STATE.txHistory.unshift({ hash, type:'escrow_release', amount: o.price, token:'ITL', ts: Date.now(), orderId: o.id, autoApproved: true });

    const svc = getService(o.serviceId);
    addNotification({
      type: 'tx',
      title: '⏰ Aprovação automática',
      body: `Pedido "${svc ? svc.title : o.id.slice(-6)}" aprovado automaticamente após ${AUTO_APPROVE_DAYS} dias. ${fmtITL(o.price)} liberados.`,
      link: '#/dashboard/client',
    });

    STATE.messages[o.id] = STATE.messages[o.id] || [];
    STATE.messages[o.id].push({
      from: o.clientId,
      text: `⏰ Aprovação automática após ${AUTO_APPROVE_DAYS} dias. ${fmtITL(o.price)} liberados via ${shortHash(hash)}.`,
      ts: nowTs(),
    });

    changed = true;
  });

  if (changed){
    persistNow();
    // re-render only if we're on the dashboard so we don't interrupt other views mid-use
    if (['dashboard','wallet'].includes(STATE.route)) render();
  }
}

/* ---------- LOCAL PERSISTENCE ---------- */
const STORAGE_KEY = 'interwork_demo_v1';
const PERSIST_STATE_KEYS = [
  'currentUserId','query','category','country','sort','ratingMin','priceMax','verifiedOnly','availableOnly',
  'selectedServiceId','orders','messages','chatOpenOrderId','dashboardTab','clientOrdersTab','walletConnected',
  'authenticated','onboardingComplete','userRole','walletProvider','network','recentlyViewed','favorites','notifications','txHistory','payouts','selectedProfileHandle',
  'language','translateChat','selectedTier','selectedAddons','selectedToken','showQR','darkMode','onboardingDismissed',
  'adminTab',  // lembra a aba ativa no painel admin
];
const PERSIST = { ready:false, timer:null, lastJson:'', quotaWarned:false };

function canUseLocalStorage(){
  try {
    const k = STORAGE_KEY + ':test';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch (_) {
    return false;
  }
}

function stateSnapshot(){
  return PERSIST_STATE_KEYS.reduce((out, key) => {
    out[key] = STATE[key];
    return out;
  }, {});
}

function persistNow(){
  if (!PERSIST.ready || !canUseLocalStorage()) return;
  try {
    const json = JSON.stringify({
      version: 1,
      savedAt: Date.now(),
      state: stateSnapshot(),
      db: {
        users: DB.users,
        services: DB.services,
        reviews: DB.reviews,
      }
    });
    if (json === PERSIST.lastJson) return;
    localStorage.setItem(STORAGE_KEY, json);
    PERSIST.lastJson = json;
  } catch (err) {
    if (!PERSIST.quotaWarned) {
      PERSIST.quotaWarned = true;
      toast('Não foi possível salvar tudo no localStorage. Remova imagens grandes ou resete a demo.', 'warn');
    }
    console.warn('Interwork persistence failed:', err);
  }
}

function schedulePersist(){
  if (!PERSIST.ready) return;
  clearTimeout(PERSIST.timer);
  PERSIST.timer = setTimeout(persistNow, 120);
}

function restorePersistedData(){
  if (!canUseLocalStorage()) return false;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (!snap || snap.version !== 1) return false;

    if (snap.db && Array.isArray(snap.db.users) && Array.isArray(snap.db.services)) {
      DB.users = snap.db.users;
      DB.services = snap.db.services;
      DB.reviews = Array.isArray(snap.db.reviews) ? snap.db.reviews : [];
    }
    if (snap.state && typeof snap.state === 'object') {
      PERSIST_STATE_KEYS.forEach(key => {
        if (Object.prototype.hasOwnProperty.call(snap.state, key)) STATE[key] = snap.state[key];
      });
    }

    if (!getUser(STATE.currentUserId)) STATE.currentUserId = 'u_me';
    if (!Array.isArray(STATE.orders)) STATE.orders = [];
    if (!Array.isArray(STATE.favorites)) STATE.favorites = [];
    if (!STATE.messages || typeof STATE.messages !== 'object') STATE.messages = {};
    if (!Array.isArray(STATE.notifications)) STATE.notifications = [];
    if (!Array.isArray(STATE.txHistory)) STATE.txHistory = [];
    if (!Array.isArray(STATE.payouts)) STATE.payouts = [];
    STATE.restoredFromStorage = true;
    PERSIST.lastJson = raw;
    return true;
  } catch (err) {
    console.warn('Interwork restore failed:', err);
    return false;
  }
}

function resetLocalDemo(){
  if (canUseLocalStorage()) localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function startPersistence(){
  PERSIST.ready = true;
  window.addEventListener('beforeunload', persistNow);
  setInterval(persistNow, 1500);
}

  const payload = {

  sbUnsubscribeDispute();
  if (!sb || !order || !order.disputeSbId) return;
  _sbDisputeChannel = sb.channel('dispute-'+order.disputeSbId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'disputes', filter: 'id=eq.'+order.disputeSbId }, payload => {

      if (!order.dispute) return;
      order.dispute.status     = incoming.status;

 * ────────────────────────────────────────────────────────── */
function sbSubscribeServices(){
  if (!sb) return;
  sb.channel('services-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'services' }, payload => {
      const changed = payload.new || payload.old;
      if (!changed) return;
      const idx = DB.services.findIndex(s => s.id === changed.id);
      if (payload.eventType === 'DELETE'){
        if (idx >= 0) DB.services.splice(idx, 1);
      } else {
        const local = sbSvcToLocal(changed);
        if (idx >= 0) DB.services[idx] = local;
        else DB.services.unshift(local);
      }
      renderView();
      // Notifica freelancer se o status mudou para aprovado
      if (payload.eventType === 'UPDATE' && changed.status === 'approved' && changed.freelancer_id === STATE.currentUserId){
        addNotification({ type:'tx', title:'✅ Serviço aprovado!', body:`"${changed.title}" foi aprovado e já está visível no marketplace.`, link:'#/dashboard/freelancer' });
        toast('Seu serviço foi aprovado! 🎉', 'success');
      }
      if (payload.eventType === 'UPDATE' && changed.status === 'rejected' && changed.freelancer_id === STATE.currentUserId){
        addNotification({ type:'tx', title:'❌ Serviço rejeitado', body:`"${changed.title}": ${changed.rejected_reason || 'sem motivo informado'}.`, link:'#/dashboard/freelancer' });
        toast('Um serviço foi rejeitado. Veja detalhes no dashboard.', 'warn');
      }
    })
    .subscribe();
}

 * CHAT — Supabase (tabela real: public.messages)
 *
 * Schema usado:
 *   id            UUID PRIMARY KEY DEFAULT gen_random_uuid()
 *   order_id      UUID NOT NULL REFERENCES orders(id) ON DELETE CASCADE

 * Não existe receiver_id nem status — read receipts ficam só no frontend.

let _chatRealtimeChannel = null; // Canal Realtime ativo no momento

/**

 * @param {string} text       - Texto da mensagem
 * @param {string|null} attachmentUrl - URL ou nome do arquivo (opcional)
 * @returns {object|null} Row inserida ou null em caso de erro
 */
async function sbSendMessage(sbOrderId, text, attachmentUrl = null) {
  if (!sb || !STATE.sbProfile?.id || !sbOrderId) return null;
  const payload = {
    order_id:       sbOrderId,
    sender_id:      STATE.sbProfile.id,
    text:           text || '',
    attachment_url: attachmentUrl || null,
  };
  const { data, error } = await sb
    .from('messages')
    .insert(payload)
    .select()
    .single();
  if (error) {
    console.warn('[Supabase Chat] Erro ao enviar mensagem:', error.message);
    return null;
  }
  return data;
}

/**
 * Carrega o histórico de mensagens de um pedido da tabela `messages`.
 * Mescla com STATE.messages local — mantém mensagens locais com dataURL de imagem.
 * @param {object} order - Objeto de pedido (usa order.sbId como order_id)
 */
async function sbLoadMessages(order) {
  if (!sb || !STATE.sbProfile?.id || !order.sbId) return;
  const { data, error } = await sb
    .from('messages')
    .select('*')
    .eq('order_id', order.sbId)
    .order('created_at', { ascending: true });
  if (error) {
    console.warn('[Supabase Chat] Erro ao carregar mensagens:', error.message);
    return;
  }
  if (!data || !data.length) return;

  // Converte formato Supabase → formato local do STATE.messages
  const remote = data.map(m => ({
    id:         m.id,
    _sbId:      m.id,
    // sender_id é UUID do Supabase — minha própria UUID → STATE.currentUserId
    from:       m.sender_id === STATE.sbProfile.id ? STATE.currentUserId : m.sender_id,
    text:       m.text || '',
    // attachment_url vira um chip no bubble (sem dataURL para preview de imagem)
    attachments: m.attachment_url ? [{ name: m.attachment_url, size: '', type: '', dataURL: null }] : [],
    status:     'read', // mensagens antigas já foram lidas
    ts:         new Date(m.created_at).getTime(),
  }));

  // Mescla: preserva mensagens locais que têm dataURL (preview de imagem)
  const existing = STATE.messages[order.id] || [];
  const remoteIds = new Set(remote.map(r => r._sbId));
  const localOnly = existing.filter(l =>
    !l._sbId &&
    l.attachments?.some(a => a.dataURL)
  );
  const merged = [...remote, ...localOnly].sort((a, b) => a.ts - b.ts);
  STATE.messages[order.id] = merged;
}

/**
 * Abre canal Realtime para a tabela `messages` filtrado pelo order_id (sbId).
 * Mensagens novas do outro usuário chegam sem necessidade de refresh.
 * @param {object} order    - Objeto do pedido (precisa de order.sbId)
 * @param {boolean} ephemeral
 */
function sbSubscribeChat(order, ephemeral) {
  if (!sb || !STATE.sbProfile?.id || !order.sbId) return;

  // Cancela canal anterior se houver
  if (_chatRealtimeChannel) {
    sb.removeChannel(_chatRealtimeChannel);
    _chatRealtimeChannel = null;
  }

  _chatRealtimeChannel = sb
    .channel('chat-' + order.sbId)
    .on(
      'postgres_changes',
      {
        event:  'INSERT',
        schema: 'public',
        table:  'messages',
        filter: `order_id=eq.${order.sbId}`,
      },
      (payload) => {
        const m = payload.new;
        if (!m) return;

        // Ignora próprias mensagens (já inseridas localmente no submit)
        if (m.sender_id === STATE.sbProfile?.id) return;

        const localMsg = {
          id:          m.id,
          _sbId:       m.id,
          from:        m.sender_id, // UUID Supabase do remetente
          text:        m.text || '',
          attachments: m.attachment_url
            ? [{ name: m.attachment_url, size: '', type: '', dataURL: null }]
            : [],
          status:      'delivered',
          ts:          new Date(m.created_at).getTime(),
        };

        STATE.messages[order.id] = STATE.messages[order.id] || [];
        STATE.messages[order.id].push(localMsg);

        if (STATE.chatOpenOrderId === order.id) {
          // Chat aberto: re-renderiza imediatamente
          renderChat(order, ephemeral);
        } else {
          // Chat fechado: badge de notificação
          addNotification({
            type:  'message',
            title: 'Nova mensagem',
            body:  m.text ? m.text.slice(0, 80) : '📎 Arquivo recebido',
            link:  '#/dashboard/client',
          });
          renderHeader();
        }
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        console.log('[Supabase Chat] Realtime conectado para pedido', order.sbId);
      }
    });
}

/**
 * Cancela a assinatura Realtime do chat.
 * Chamado em closeChat().
 */
function sbUnsubscribeChat() {
  if (_chatRealtimeChannel && sb) {
    sb.removeChannel(_chatRealtimeChannel);
    _chatRealtimeChannel = null;
  }
}

async function handleAdminInlineLogin(){
  const email = document.getElementById('admin-login-email')?.value?.trim();
  const pwd   = document.getElementById('admin-login-pwd')?.value;
  const errEl = document.getElementById('admin-login-err');
  const btn   = document.getElementById('admin-login-btn');
  if (errEl) errEl.classList.add('hidden');
  if (!email || !pwd){
    if (errEl){ errEl.textContent = 'Preencha email e senha.'; errEl.classList.remove('hidden'); }
    return;
  }
  if (!SB_READY || !sb){
    if (errEl){ errEl.textContent = 'Supabase não está configurado neste ambiente.'; errEl.classList.remove('hidden'); }
    return;
  }
  if (btn){ btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Aguarde...'; icons(); }
  let result;
  try {
    result = await sbSignIn(email, pwd);
  } catch (e){
    // Fallback de debug: mostra o erro exato em vez de falhar silenciosamente
    if (errEl){ errEl.textContent = 'Erro inesperado: ' + (e?.message || e); errEl.classList.remove('hidden'); }
    if (btn){ btn.disabled = false; btn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i>Fazer login'; icons(); }
    return;
  }
  if (result?.error){
    if (errEl){ errEl.textContent = result.error.message || 'Não foi possível entrar.'; errEl.classList.remove('hidden'); }
    if (btn){ btn.disabled = false; btn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i>Fazer login'; icons(); }
    return;
  }
  // Sucesso: sbSignIn() já chamou render() internamente.
  toast('Login realizado com sucesso!', 'success');
}

  if (SB_READY && sb){
    const { error } = await sbRejectService(id, reason);
    if (error){ toast('Erro: '+error.message, 'error'); return; }
  } else {
    svc.status = 'rejected';
    svc.rejectedReason = reason;
  }
  toast(`Serviço rejeitado.`, 'warn');
  addNotification({ type:'tx', title:'Serviço rejeitado', body:`"${svc.title}" foi rejeitado. Motivo: ${reason}`, link:'#/home' });
  render();
}

/* ============================================================ */
window.addEventListener('DOMContentLoaded', () => {
  initMock();
  DB.services.forEach(s => s._mock = true); // marca ANTES do Supabase sobrescrever
  const restored = restorePersistedData();
  startPersistence();
  bindRouter();
  if (restored) setTimeout(()=>toast('Dados restaurados do localStorage.', 'success'), 250);

  // ── Auto-approve engine: run once on boot, then every 60 s ──
  runAutoApprove();
  setInterval(runAutoApprove, 60_000);


  // Re-render dashboard countdown banners every 60 s so timers stay accurate
  setInterval(()=>{
    const hasDelivered = STATE.orders.some(o => o.status === 'delivered');
    if (hasDelivered && ['dashboard'].includes(STATE.route)) render();
  }, 60_000);
  // Filter bar pinning disabled by request — bar is now static and scrolls with the page
  function bindFilterPin(){
    const bar = document.querySelector('.filters-sticky');
    const spacer = document.querySelector('.filters-sticky-spacer');
    if (bar) bar.classList.remove('is-pinned');
    if (spacer){ spacer.classList.remove('is-active'); spacer.style.height = '0px'; }
  }
  // Re-bind after every view render (innerHTML replacement loses listeners on children but window listener persists)
  const origRender = window.renderView;
  if (typeof origRender === 'function'){
    window.renderView = function(){ origRender.apply(this, arguments); setTimeout(bindFilterPin, 0); };
  }
  setTimeout(bindFilterPin, 100);

  // ── Supabase: inicializa auth
  if (SB_READY) {
    sbInitAuth().then(() => {
      sbLoadServices();
      sbSubscribeServices();
    });
  } else {
    // Marca serviços mock para diferenciá-los dos reais
    DB.services.forEach(s => s._mock = true);
  }
});

// 1. CARREGAR PERFIL DO USUÁRIO LOGADO
async function sbLoadProfile(userId) {
  if (!sb || !userId) return null;
  try {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();
    if (error) {
      console.warn('[Supabase] Erro ao carregar perfil:', error.message);
      return null;
    }
    console.log('✅ Perfil carregado:', profile.handle);
    return profile;
  } catch (err) {
    console.error('[Supabase] Erro ao carregar perfil:', err);
    return null;
  }
}

// 2. BUSCAR PERFIL POR HANDLE
async function sbGetProfileByHandle(handle) {
  if (!sb || !handle) return null;
  try {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('*')
      .eq('handle', handle)
      .single();
    if (error) {
      console.warn('[Supabase] Perfil não encontrado:', handle);
      return null;
    }
    return profile;
  } catch (err) {
    console.error('[Supabase] Erro ao buscar perfil:', err);
    return null;
  }
}

// 3. ATUALIZAR PERFIL DO USUÁRIO LOGADO
async function sbUpdateProfile(updates) {
  if (!sb || !STATE.sbUser?.id) {
    throw new Error('Usuário não autenticado');
  }
  try {
    const { data: updated, error } = await sb
      .from('profiles')
      .update({
        ...updates,
        updated_at: new Date().toISOString()
      })
      .eq('id', STATE.sbUser.id)
      .select()
      .single();
    if (error) throw error;
    STATE.sbProfile = updated;
    console.log('✅ Perfil atualizado');
    return updated;
  } catch (err) {
    console.error('[Supabase] Erro ao atualizar perfil:', err);
    throw err;
  }
}

// 4. REGISTRAR NOVO USUÁRIO
async function sbRegisterUser(email, password, name, role = 'freelancer') {
  if (!sb) throw new Error('Supabase não configurado');
  try {
    const { data: { user }, error: signUpError } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: {
          name,
          role,
          handle: email.split('@')[0]
        }
      }
    });
    if (signUpError) throw signUpError;
    console.log('✅ Usuário registrado:', user.id);
    return user;
  } catch (err) {
    console.error('[Supabase] Erro ao registrar:', err);
    throw err;
  }
}

// 5. LOGIN
async function sbLoginUser(email, password) {
  if (!sb) throw new Error('Supabase não configurado');
  try {
    const { data: { user }, error } = await sb.auth.signInWithPassword({
      email,
      password
    });
    if (error) throw error;
    console.log('✅ Login bem-sucedido:', user.email);
    return user;
  } catch (err) {
    console.error('[Supabase] Erro ao fazer login:', err);
    throw err;
  }
}

// 6. LOGOUT
async function sbLogoutUser() {
  if (!sb) return;
  try {
    const { error } = await sb.auth.signOut();
    if (error) throw error;
    STATE.sbProfile = null;
    console.log('✅ Logout bem-sucedido');
  } catch (err) {
    console.error('[Supabase] Erro ao fazer logout:', err);
  }
}

// 7. LISTAR TODOS OS FREELANCERS VERIFICADOS
async function sbListFreelancers(filters = {}) {
  if (!sb) return [];
  try {
    let query = sb
      .from('profiles')
      .select('*')
      .eq('verified', true)
      .eq('role', 'freelancer');
    if (filters.minRating) {
      query = query.gte('rating', filters.minRating);
    }
    const { data: freelancers, error } = await query
      .order('rating', { ascending: false });
    if (error) throw error;
    return freelancers || [];
  } catch (err) {
    console.error('[Supabase] Erro ao listar freelancers:', err);
    return [];
  }
}

async function sbLoadProfileByWallet(walletAddress) {
  if (!sb || !walletAddress) return null;
  try {
    const { data: profile, error } = await sb.from('profiles').select('*').eq('wallet_address', walletAddress.toLowerCase()).single();
    if (error) return null;
    STATE.sbProfile = profile;
    STATE.currentUserId = profile.id;
    return profile;
  } catch (err) {
    return null;
  }
}

async function sbLoadOrders() {
  if (!sb || !STATE.currentUserId) return [];
  try {
    const { data: orders, error } = await sb.from('orders').select('*').or(`client_id.eq.${STATE.currentUserId},freelancer_id.eq.${STATE.currentUserId}`);
    if (error) throw error;
    return orders || [];
  } catch (err) {
    return [];
  }
}

async function sbSyncITLBalance() {
  if (!sb || !STATE.currentUserId) return 0;
  try {
    const { data: profile, error } = await sb.from('profiles').select('balance_itl').eq('id', STATE.currentUserId).single();
    if (error) throw error;
    STATE.itlBalance = profile.balance_itl || 0;
    return STATE.itlBalance;
  } catch (err) {
    return 0;
  }
}
