<script>
(function initReown() {
  const MAX = 50, DELAY = 100;
  let tries = 0;
  function tryInit() {
    tries++;
    const createAppKit = window.__ReownCreateAppKit;
    const EthersAdapter  = window.__ReownEthersAdapter;
    const nets           = window.__ReownNetworks;
    if (!createAppKit || !EthersAdapter || !nets) {
      if (tries < MAX) setTimeout(tryInit, DELAY);
      return;
    }
    try {
      const modal = createAppKit({
        adapters: [new EthersAdapter()],
        networks: [nets.bsc, nets.mainnet, nets.polygon],
        defaultNetwork: nets.bsc,
        projectId: '2ee67a36114285f54c77e2f785e69462',
        metadata: {
          name: 'Interwork',
          description: 'The workforce marketplace for the Interlink ecosystem',
          url: 'https://interwork.online',
          icons: ['https://interwork.online/favicon.png'],
        },
        themeMode: 'dark',
        features: { analytics: false, email: false, socials: false },
      });
      window._reownModal = modal;
      modal.subscribeAccount(function(account) {
        if (account && account.isConnected && account.address) {
          if (typeof window._handleReownConnected === 'function')
            window._handleReownConnected(account.address);
        } else {
          if (typeof window._handleReownDisconnected === 'function')
            window._handleReownDisconnected();
        }
      });
    } catch(e) {
      console.error('[Reown] Erro ao inicializar AppKit:', e);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInit);
  } else {
    tryInit();
  }
})();
</script>

// Helper para pegar elemento do DOM
function $(sel) { return document.querySelector(sel); }

// Avatar SVG simples
function avatarSVG(letter, color) {
  return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect fill='${encodeURIComponent(color)}' width='120' height='120'/%3E%3Ctext x='60' y='70' font-size='50' font-weight='bold' fill='white' text-anchor='middle' font-family='Inter'%3E${letter}%3C/text%3E%3C/svg%3E`;
}

function getAvatarSrc(name, color) {
  return { type: 'generated', src: avatarSVG((name || 'U')[0].toUpperCase(), color || '#1a73e8') };
}

// Toast notificação
function toast(msg, kind = 'info') {
  STATE.toastSeq++;
  const id = 't' + STATE.toastSeq;
  const colors = { info: 'bg-ink-900', success: 'bg-emerald-600', warn: 'bg-amber-500', error: 'bg-rose-600' };
  const root = $('#toast-root');
  const el = document.createElement('div');
  el.id = id;
  el.className = `fade-in ${colors[kind]} text-white text-sm font-medium px-4 py-3 rounded-xl shadow-pop flex items-center gap-2 max-w-sm`;
  el.innerHTML = `<i data-lucide="${kind === 'success' ? 'check-circle' : kind === 'error' ? 'alert-circle' : 'info'}" class="w-4 h-4"></i><span>${msg}</span>`;
  root.appendChild(el);
  lucide.createIcons();
  setTimeout(() => {
    el.style.transition = 'opacity .3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 3200);
}

// Fechar modal

  $('#modal-root').innerHTML = '';

// Render (placeholder)
function render() {
  console.log('🔄 Render called - STATE:', STATE);
}

// Persistência local
const STORAGE_KEY = 'interwork_v1';
function persistNow() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
  } catch (e) {
    console.warn('LocalStorage error:', e);
  }
}

// Recuperar do localStorage
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const loaded = JSON.parse(saved);
      Object.assign(STATE, loaded);
      console.log('✅ Estado restaurado do localStorage');

/* ═══════════════════════════════════════════════════════════════
   FUNÇÕES SUPABASE
   ═══════════════════════════════════════════════════════════════ */

async function sbLoadProfile(userId) {
  if (!sb || !userId) return null;
  try {
    const { data: profile, error } = await sb
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .single();
    if (error) {
      console.warn('[Supabase] Erro ao carregar perfil:', error.message);
      return null;
    }
    console.log('✅ Perfil carregado:', profile.handle);
    return profile;
  } catch (err) {
    console.error('[Supabase] Erro ao carregar perfil:', err);
    return null;
  }
}

/* ═══════════════════════════════════════════════════════════════
   FUNÇÕES DE CONEXÃO COM CARTEIRA — DO CÓDIGO v36
   ═══════════════════════════════════════════════════════════════ */

// Abre o modal nativo do Reown com QR code e lista de carteiras
function openConnectWallet(reason) {
  if (window._reownModal) {
    window._reownModal.open();
    return;
  }
  // SDK ainda carregando — aguarda até 6s
  toast('Carregando carteiras...', 'warn');
  let tries = 0;
  const poll = setInterval(() => {
    tries++;
    if (window._reownModal) {
      clearInterval(poll);
      window._reownModal.open();
      return;
    }
    if (tries > 20) {
      clearInterval(poll);
      toast('Erro ao carregar SDK de carteira. Recarregue a página.', 'error');
    }
  }, 300);
}

// Chamado pelo módulo Reown quando carteira conecta com sucesso
window._handleReownConnected = async function(address) {
  // Sincroniza com Supabase (Anonymous Auth) ligada à wallet
  try {
    if (typeof sb !== 'undefined' && sb) {
      let { data: sessionData } = await sb.auth.getSession();
      if (!sessionData.session) {
        const { error: signInError } = await sb.auth.signInAnonymously({
          options: { data: { wallet: address, name: 'Usuário', role: 'client' } }
        });
        if (signInError) console.warn('[Supabase] Erro no login anônimo:', signInError.message);
      }
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        await sb.from('profiles').update({ wallet_address: address }).eq('id', user.id);
        STATE.sbProfile = await sbLoadProfile(user.id);
      }
    }
  } catch (e) {
    console.warn('[Supabase] Falha ao sincronizar sessão da wallet:', e);
  }

  // Atualiza STATE com dados da wallet
  const shortW = address.slice(0, 6) + '...' + address.slice(-4);
  if (!STATE.onboardingComplete) {
    STATE.onboardingComplete = true;
    STATE.userRole = 'client';
    STATE.dashboardTab = 'client';
  }
  STATE.walletProvider = 'WalletConnect';
  STATE.walletConnected = true;
  STATE.authenticated = true;
  STATE.sbUser = { id: address }; // Armazena endereço como ID

  console.log('✅ Carteira conectada:', shortW);
  toast(`Carteira conectada: ${shortW}`, 'success');
  closeModal();
  persistNow();
  render();
};

// Chamado pelo módulo Reown quando carteira desconecta
window._handleReownDisconnected = function() {
  if (!STATE.walletConnected) return;
  STATE.walletConnected = false;
  STATE.authenticated = false;
  toast('Wallet desconectada.', 'warn');
  render();
};

// Wrapper para compatibilidade
function connectWallet(provider) {
  openConnectWallet();
}

// Desconecta carteira
function disconnectWallet() {
  if (window._reownModal) {
    try { window._reownModal.disconnect(); } catch (e) {}
  }
  STATE.walletConnected = false;
  STATE.authenticated = false;
  closeModal();
  toast('Wallet desconectada', 'info');
  render();
}

        <div class="bg-gradient-to-br from-brand-50 to-violet-50 rounded-2xl p-12 text-center">
          <h1 class="text-4xl font-bold text-ink-900 mb-4">Bem-vindo ao Interwork</h1>
          <p class="text-ink-600 mb-8 text-lg">Marketplace descentralizado para freelancers na Interlink Network</p>
          
          ${!STATE.walletConnected ? `
            <button 
              onclick="openConnectWallet()" 
              class="inline-flex items-center gap-2 px-8 py-4 bg-brand-500 text-white rounded-xl font-semibold hover:bg-brand-600 transition shadow-pop"
            >
              <i data-lucide="wallet" class="w-5 h-5"></i>
              Conectar Carteira
            </button>
          ` : `
            <div class="space-y-4">
              <div class="bg-white rounded-xl p-6 text-left inline-block">
                <p class="text-sm text-ink-500 mb-2">Carteira conectada</p>
                <p class="text-2xl font-bold text-brand-500">${STATE.sbUser?.id || 'Desconhecido'}</p>
              </div>
              <div>
                <button 
                  onclick="disconnectWallet()" 
                  class="inline-flex items-center gap-2 px-8 py-4 bg-rose-500 text-white rounded-xl font-semibold hover:bg-rose-600 transition"
                >
                  <i data-lucide="log-out" class="w-5 h-5"></i>
                  Desconectar
                </button>
              </div>
            </div>
          `}
        </div>
      </div>
    `;
    lucide.createIcons();
  }
});
</script>

</body>
</html>
